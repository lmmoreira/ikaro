version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    versioning-strategy: lockfile-only
    groups:
      all-dependencies:
        patterns:
          - '*'
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /apps/backend
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /apps/bff
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday

  # Terraform provider pins (M17-S11). Watches the env roots, where the
  # .terraform.lock.hcl files live; on a provider MAJOR bump, update the
  # module-level pins in the same PR (see infra/terraform/README.md).
  - package-ecosystem: terraform
    directories:
      - /infra/terraform/envs/staging
      - /infra/terraform/envs/prod
    schedule:
      interval: weekly
      day: monday
