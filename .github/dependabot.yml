version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      all-dependencies:
        patterns:
          - '*'
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /apps/backend
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /apps/bff
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
