name: App — Staging Deploy Pipeline

# Build -> scan -> push -> migrate -> deploy -> smoke, on every push to main
# touching apps/**, packages/**, or the lockfile (M17-S25). Trunk-based, no
# approval gate (D10) — staging auto-deploys on every merge. Authenticates
# as the narrow `app-deployer` WIF identity (S08, staging project — it
# already has cross-project artifactregistry.writer on the prod registry,
# M17-S15, D8); migrate/deploy jobs share
# `concurrency: { group: staging-mutations }` with the infra pipeline
# (M17-S24) so a Terraform apply and an app deploy can never mutate the
# same staging resources concurrently.
#
# Images build ONCE, generically, for all three services (TD29 removed
# every NEXT_PUBLIC_* build-time dependency from web's client bundle — see
# td/TD29-WEB-RUNTIME-PUBLIC-CONFIG.md). ikaro-web:<sha> here is
# byte-identical to what M17-S26 later promotes to prod; no build step in
# this workflow injects NEXT_PUBLIC_* anywhere.
#
# This workflow is not a required branch-protection check (it runs after
# merge, not as a PR gate), so a plain `paths:` trigger filter is enough —
# unlike infra-deploy.yml, there's no need for the job-level
# dorny/paths-filter pattern that exists there purely to keep a *required*
# check reporting on every PR.
#
# Every `${{ }}` value a `run:` step needs is passed through `env:` and
# read back as a plain shell variable ($FOO), never inlined directly into
# the script text — same discipline as infra-deploy.yml's "Check results"
# step (zizmor's template-injection audit; also easier to read).
#
# Rollback (staging): re-run this workflow for a previous commit's SHA
# (Actions -> "Re-run jobs"), or push a revert commit to main — both are
# "fix forward" in spirit, since staging has no approval gate to pause on.
# Cloud Run also keeps prior revisions, so `gcloud run services
# update-traffic ikaro-<service> --to-revisions=<prev>=100` is an instant
# manual fallback if a re-run isn't fast enough.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-staging.yml'

permissions:
  contents: read

env:
  GAR_HOST: ${{ vars.GAR_HOST }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_PROJECT_STAGING: ${{ vars.GCP_PROJECT_STAGING }}
  # Single Artifact Registry, prod project only (D8) — staging's
  # app-deployer has cross-project write access (M17-S15). NOT
  # GCP_PROJECT_STAGING; the registry itself always lives in prod.
  IMAGE_BACKEND: ${{ vars.GAR_HOST }}/${{ vars.GCP_PROJECT_PROD }}/ikaro-registry/ikaro-backend:${{ github.sha }}
  IMAGE_BFF: ${{ vars.GAR_HOST }}/${{ vars.GCP_PROJECT_PROD }}/ikaro-registry/ikaro-bff:${{ github.sha }}
  IMAGE_WEB: ${{ vars.GAR_HOST }}/${{ vars.GCP_PROJECT_PROD }}/ikaro-registry/ikaro-web:${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------
  # Build, scan, push (matrix, parallel) — no staging resources touched
  # here, so no `environment:`/concurrency lock needed.
  # ---------------------------------------------------------------------

  build-scan-push:
    name: Build, scan, push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: apps/backend/Dockerfile
            image: ${{ vars.GAR_HOST }}/${{ vars.GCP_PROJECT_PROD }}/ikaro-registry/ikaro-backend:${{ github.sha }}
          - service: bff
            dockerfile: apps/bff/Dockerfile
            image: ${{ vars.GAR_HOST }}/${{ vars.GCP_PROJECT_PROD }}/ikaro-registry/ikaro-bff:${{ github.sha }}
          - service: web
            dockerfile: apps/web/Dockerfile
            image: ${{ vars.GAR_HOST }}/${{ vars.GCP_PROJECT_PROD }}/ikaro-registry/ikaro-web:${{ github.sha }}
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    env:
      SERVICE: ${{ matrix.service }}
      DOCKERFILE: ${{ matrix.dockerfile }}
      IMAGE: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as app-deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.APP_DEPLOYER_SA_STAGING }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$GAR_HOST" --quiet

      - name: Set up Docker Buildx
        run: docker buildx create --use --driver docker-container

      - name: Build ${{ matrix.service }} image
        run: |
          docker buildx build \
            --cache-from "type=gha,scope=deploy-staging-${SERVICE}" \
            --cache-to "type=gha,scope=deploy-staging-${SERVICE},mode=max" \
            --load \
            -f "$DOCKERFILE" \
            -t "$IMAGE" \
            .

      # ignore-unfixed: true, matching the PR gate (pr-tests.yml), not
      # stricter — deliberate (story-discovery, 2026-07-22): blocking on an
      # unfixed CVE has no available remediation, so it would leave this
      # pipeline red indefinitely and, via M17-S26's staging-must-be-current
      # precondition, transitively block prod promotion too — including
      # during an incident where the fix being shipped has nothing to do
      # with the CVE. Unfixed-CVE visibility stays the weekly SARIF
      # report's job (docs/17-GITHUB_WORKFLOWS_GUIDELINES.md § Trivy), not
      # a deploy gate's.
      - name: Trivy scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push ${{ matrix.service }} image
        run: docker push "$IMAGE"

  # ---------------------------------------------------------------------
  # Migrate — must succeed before anything deploys against the schema.
  # ---------------------------------------------------------------------

  migrate:
    name: Migrate
    needs: build-scan-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    concurrency:
      group: staging-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    steps:
      - name: Authenticate as app-deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.APP_DEPLOYER_SA_STAGING }}

      - name: Run ikaro-migrate
        run: |
          gcloud run jobs update ikaro-migrate \
            --image "$IMAGE_BACKEND" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_STAGING"

          # max_retries=0 (M17-S20) — a failed migration must fail loudly,
          # not retry into a half-applied state. --wait propagates the
          # execution's exit code, so a non-zero migration stops the
          # pipeline here; nothing downstream deploys against a
          # half-migrated schema.
          gcloud run jobs execute ikaro-migrate \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_STAGING" \
            --wait

  # ---------------------------------------------------------------------
  # Deploy (sequential) — bff's readiness depends on backend being up;
  # web has no such dependency but is kept last, matching the plan's
  # documented stage order.
  # ---------------------------------------------------------------------

  deploy:
    name: Deploy
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    concurrency:
      group: staging-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    outputs:
      bff_url: ${{ steps.bff-url.outputs.url }}
      web_url: ${{ steps.web-url.outputs.url }}
    steps:
      - name: Authenticate as app-deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.APP_DEPLOYER_SA_STAGING }}

      # `gcloud run deploy` blocks until the new revision is Ready and
      # serving traffic by default (no --async) — a failed rollout fails
      # this step, no extra "wait for READY" logic needed.
      - name: Deploy backend
        run: |
          gcloud run deploy ikaro-backend \
            --image "$IMAGE_BACKEND" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_STAGING"

      - name: Deploy bff
        run: |
          gcloud run deploy ikaro-bff \
            --image "$IMAGE_BFF" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_STAGING"

      - name: Deploy web
        run: |
          gcloud run deploy ikaro-web \
            --image "$IMAGE_WEB" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_STAGING"

      # *.run.app URLs are a per-project random hash (M17-S18/S25 findings)
      # — read back live rather than hardcoded, so smoke always targets
      # the real current URL.
      - name: Resolve bff URL
        id: bff-url
        run: |
          URL=$(gcloud run services describe ikaro-bff \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_STAGING" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Resolve web URL
        id: web-url
        run: |
          URL=$(gcloud run services describe ikaro-web \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_STAGING" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # Smoke — read-only, no GCP auth or mutation lock needed.
  # ---------------------------------------------------------------------

  smoke:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BFF_URL: ${{ needs.deploy.outputs.bff_url }}
      WEB_URL: ${{ needs.deploy.outputs.web_url }}
    steps:
      # Retries/backoff tolerate a cold-start instance still spinning up
      # right after deploy (min_instance_count=0 everywhere, M17-S18).
      - name: Smoke test bff
        run: |
          curl -f --retry 5 --retry-delay 5 --retry-connrefused \
            "${BFF_URL}/v1/health/ready"

      - name: Smoke test web
        run: |
          curl -f --retry 5 --retry-delay 5 --retry-connrefused \
            "${WEB_URL}/api/health/ready"
