name: PR — E2E Tests (Playwright)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # ── Infrastructure ────────────────────────────────────────────────────────
      - name: Start infrastructure (postgres, pubsub, gcs, mailhog)
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for postgres
        run: |
          until docker compose -f docker/docker-compose.yml exec -T postgres \
            pg_isready -U postgres -d ikaro; do sleep 2; done

      # ── Database ──────────────────────────────────────────────────────────────
      - name: Run migrations
        run: pnpm db:migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ikaro_app
          DB_PASSWORD: ikaro_app
          DB_NAME: ikaro
          DB_MIGRATOR_USER: ikaro_migrator
          DB_MIGRATOR_PASSWORD: ikaro_migrator
          PUBSUB_EMULATOR_HOST: localhost:8085
          PUBSUB_PROJECT_ID: ikaro-local

      - name: Seed database
        run: pnpm db:seed
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ikaro_app
          DB_PASSWORD: ikaro_app
          DB_NAME: ikaro
          DB_MIGRATOR_USER: ikaro_migrator
          DB_MIGRATOR_PASSWORD: ikaro_migrator
          PUBSUB_EMULATOR_HOST: localhost:8085
          PUBSUB_PROJECT_ID: ikaro-local
          PUBSUB_AUTO_CREATE: 'true'
          GCS_EMULATOR_HOST: 'http://localhost:4443'
          GCS_BUCKET_NAME: ikaro-local
          GCS_PUBLIC_BUCKET_NAME: ikaro-local-public
          GCS_PUBLIC_BASE_URL: 'http://localhost:4443'
          GCS_KEY_FILE: docker/fake-service-account.json
          EMAIL_ADAPTER: mailhog
          EMAIL_FROM: noreply@ikaro.example
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          JWT_SECRET: 'e2e-ci-jwt-secret-must-be-at-least-64-characters-long-xxxxxxxxxxxxx'
          PLATFORM_ADMIN_KEY: 'e2e-ci-platform-admin-key-must-be-32-chars!!'
          INTERNAL_API_KEY: 'e2e-ci-internal-api-key-must-be-32-chars!!'
          FRONTEND_URL: 'http://localhost:3000'
          HOTSITE_REVALIDATE_SECRET: 'e2e-ci-revalidate-secret-must-be-32ch!!'
          ENABLE_DEV_AUTH: 'true'

      # ── Application servers ───────────────────────────────────────────────────
      - name: Start backend (background)
        run: pnpm --filter @ikaro/backend dev &
        env:
          NODE_ENV: development
          PORT: '3001'
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: ikaro_app
          DB_PASSWORD: ikaro_app
          DB_NAME: ikaro
          DB_MIGRATOR_USER: ikaro_migrator
          DB_MIGRATOR_PASSWORD: ikaro_migrator
          PUBSUB_EMULATOR_HOST: localhost:8085
          PUBSUB_PROJECT_ID: ikaro-local
          PUBSUB_AUTO_CREATE: 'true'
          PUBSUB_MAX_DELIVERY_ATTEMPTS: '5'
          GCS_EMULATOR_HOST: 'http://localhost:4443'
          GCS_BUCKET_NAME: ikaro-local
          GCS_PUBLIC_BUCKET_NAME: ikaro-local-public
          GCS_PUBLIC_BASE_URL: 'http://localhost:4443'
          GCS_KEY_FILE: docker/fake-service-account.json
          GCS_MAX_UPLOAD_BYTES: '10485760'
          EMAIL_ADAPTER: mailhog
          EMAIL_FROM: noreply@ikaro.example
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          JWT_SECRET: 'e2e-ci-jwt-secret-must-be-at-least-64-characters-long-xxxxxxxxxxxxx'
          PLATFORM_ADMIN_KEY: 'e2e-ci-platform-admin-key-must-be-32-chars!!'
          INTERNAL_API_KEY: 'e2e-ci-internal-api-key-must-be-32-chars!!'
          FRONTEND_URL: 'http://localhost:3000'
          HOTSITE_REVALIDATE_SECRET: 'e2e-ci-revalidate-secret-must-be-32ch!!'
          ENABLE_DEV_AUTH: 'true'

      - name: Start BFF (background)
        run: pnpm --filter @ikaro/bff dev &
        env:
          NODE_ENV: development
          PORT: '3002'
          BACKEND_INTERNAL_URL: 'http://localhost:3001'
          JWT_SECRET: 'e2e-ci-jwt-secret-must-be-at-least-64-characters-long-xxxxxxxxxxxxx'
          JWT_EXPIRES_IN: 7d
          GOOGLE_CLIENT_ID: e2e-test-client-id
          GOOGLE_CLIENT_SECRET: e2e-test-client-secret
          GOOGLE_CALLBACK_URL: 'http://localhost:3002/v1/auth/google/callback'
          ALLOWED_ORIGINS: 'http://localhost:3000'
          FRONTEND_URL: 'http://localhost:3000'
          CRON_SECRET: 'e2e-ci-cron-secret-must-be-at-least-32-chars!!'
          INTERNAL_API_KEY: 'e2e-ci-internal-api-key-must-be-32-chars!!'
          ENABLE_DEV_AUTH: 'true'

      - name: Start web (background)
        run: pnpm --filter @ikaro/web dev &
        env:
          NEXT_PUBLIC_BFF_URL: 'http://localhost:3002/v1'
          NEXT_PUBLIC_HOTSITE_IMAGE_BASE_URL: 'http://localhost:4443/ikaro-local-public'
          HOTSITE_REVALIDATE_SECRET: 'e2e-ci-revalidate-secret-must-be-32ch!!'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'

      # ── Wait for services ─────────────────────────────────────────────────────
      - name: Wait for services to be ready
        run: |
          until curl -sf http://localhost:3001/health/live; do sleep 3; done
          echo "Backend ready"
          until curl -sf http://localhost:3002/health/live; do sleep 3; done
          echo "BFF ready"
          until curl -sf http://localhost:3000; do sleep 3; done
          echo "Web ready"
        timeout-minutes: 5

      # ── Playwright ────────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: pnpm --filter @ikaro/web exec playwright install chromium --with-deps

      - name: Run Playwright E2E
        run: pnpm --filter @ikaro/web e2e:ci
        env:
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
