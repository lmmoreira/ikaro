name: PR — Quality Gates

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  no-infra-app-mix:
    name: No infra + app mix
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect infra vs app changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            infra:
              - 'infra/terraform/**'
            app:
              - 'apps/**'
              - 'packages/**'

      # TD30 (2026-07-22): plan/M17-CLOUD-DEPLOY.md's Wave 3 preamble (M17-S24)
      # already documents this as a convention ("do not mix infra/terraform/**
      # and apps/** changes in one PR; when unavoidable, note in the PR that
      # infra applies first and re-run the app deploy if it won the race")
      # — this job is the first automated enforcement of it. Just a path
      # diff, so it reports back in seconds, well before lint/type-check/
      # tests finish — not a true blocking-first gate (that would mean
      # adding needs: to every other job here, a much bigger change for a
      # problem this doesn't require it to solve).
      #
      # The documented convention explicitly allows an "unavoidable" mix if
      # it's noted in the PR — an unconditional fail here would make that
      # exception impossible to actually use (review finding, 2026-07-22).
      # The `infra-app-mix-ok` label is the auditable, deliberate override:
      # a human has to add it explicitly (it won't exist by default), same
      # spirit as any other manual acknowledgment gate in this repo.
      - name: Fail if both infra and app changed (unless explicitly acknowledged)
        if: |
          steps.filter.outputs.infra == 'true' &&
          steps.filter.outputs.app == 'true' &&
          !contains(github.event.pull_request.labels.*.name, 'infra-app-mix-ok')
        run: |
          echo "::error::This PR touches both infra/terraform/** and apps/** or packages/** — split them into separate PRs. If truly unavoidable, note in the PR description that infra applies first and re-run the app deploy if it loses the race against the Terraform apply, then add the 'infra-app-mix-ok' label to acknowledge and bypass this check."
          exit 1

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm prettier --check .

  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

  env-contract:
    name: Terraform env-var contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Cross-checks apps/backend + apps/bff env.validation.ts against the
      # Terraform env/secret maps in infra/terraform/envs/*/main.tf — a var
      # added in code but forgotten in Terraform fails here instead of at
      # deploy time (M17-S18). test includes the real-repo regression guard;
      # env-contract also runs the actual CLI entry point.
      - run: pnpm --filter @ikaro/infra-scripts run test
      - run: pnpm --filter @ikaro/infra-scripts run env-contract

  pubsub-catalog:
    name: Pub/Sub topic/subscription catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Scans apps/backend/src for every GcpPubSubEventBusAdapter
      # subscribe()/registerTrigger() call site and regenerates
      # infra/terraform/pubsub-catalog.json (modules/pubsub's for_each source
      # of truth) — an event or cron trigger registered in code without
      # regenerating the catalog fails here instead of leaving a subscription
      # unprovisioned in Terraform (M17-S19). test covers the scanner's own
      # unit specs; pubsub-catalog regenerates the real file; the diff check
      # proves the committed file matches what the code actually registers.
      - run: pnpm --filter @ikaro/infra-scripts run test
      - run: pnpm --filter @ikaro/infra-scripts run pubsub-catalog
      - run: git diff --exit-code infra/terraform/pubsub-catalog.json

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # reviewdog's github-pr-check reporter posts a Check run via this
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: reviewdog/action-actionlint@01d2dd67e3525e5a0ce72e8fa38e5a3ab65e2ded # v1.72.1
        with:
          fail_level: error
          reporter: github-pr-check

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # zizmor-action's advanced-security mode uploads SARIF to the Security tab via this
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
