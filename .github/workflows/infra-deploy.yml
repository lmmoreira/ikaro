name: Infra — Terraform Deploy Pipeline

# The Terraform lifecycle for infra/terraform/**: PR plan + tests, merge-to-main
# auto-applies staging then (after approval) prod, weekly drift detection.
# After this workflow exists, manual `terraform apply` is forbidden — see
# infra/terraform/README.md's warning banner.
#
# All jobs that gate PRs run unconditionally (no workflow-level `paths:`
# filter) and use a job-level `dorny/paths-filter` step instead, so a
# required branch-protection check always reports — even as a correct
# no-op "skipped" — on a PR that never touches infra/terraform/**. A
# workflow-level path filter would mean the job never runs at all on such a
# PR, and GitHub blocks merges forever on a required check that never
# reports (docs/17-GITHUB_WORKFLOWS_GUIDELINES.md § Manual/throwaway
# workflow triggers documents the same class of gotcha for a different
# trigger; this is the PR-path-filter analogue).
#
# Deliberately no top-level `concurrency:` block: this workflow mixes
# cancel-safe PR plan jobs (job-level concurrency, cancel-in-progress: true)
# with apply jobs that must never be cancelled mid-`terraform apply`
# (job-level concurrency, cancel-in-progress: false, fixed group names
# shared with the S25 app-deploy workflow). A single workflow-level group
# can't express both behaviors, and `push` events to `main` always share
# the same `github.ref` — a workflow-level `cancel-in-progress: true` would
# risk cancelling an in-flight prod apply on the next merge.
#
# `IAM_ADMIN_USER` is a repo-level GitHub Variable, not environment-scoped:
# environment-scoped values are only visible to jobs that declare that
# exact `environment:`, and `plan-*`/`drift-*` jobs deliberately declare
# none (same reasoning as the tf-planner WIF binding — PR plans and drift
# checks must run without an approval gate). Repo-level is the only scope
# every job here can see (review finding, 2026-07-21). `BREVO_SMTP_LOGIN`
# is a repo-level Secret instead of a Variable, even though it's non-secret
# per the S16 catalog: GitHub does not mask Variables in logs the way it
# masks Secrets, and this value (unlike `IAM_ADMIN_USER`, already public
# throughout docs/BOOTSTRAP_LOG.md) had never appeared anywhere else in
# this repo before — a live run confirmed it printing in plaintext in the
# job's `env:` log block (review finding, 2026-07-21).

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: '30 9 * * 1' # weekly drift check, Monday 09:30 UTC
  workflow_dispatch: {} # manual re-run of the drift check only

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # PR gate: fmt, validate, terraform test (mocked, no credentials), plan
  # ---------------------------------------------------------------------

  detect-changes:
    name: Detect infra changes
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      modules: ${{ steps.modules.outputs.modules }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect infra/terraform changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # Includes this workflow file itself, not just infra/terraform/**
          # — a future PR touching only the pipeline's own YAML (no .tf
          # changes) still needs a real fmt/validate/test/plan run before
          # merge, same as any other change to this pipeline. Without this,
          # such a PR would silently skip every Terraform job again, the
          # same verification gap this story's own review already found
          # once (review finding, 2026-07-21).
          filters: |
            infra:
              - 'infra/terraform/**'
              - '.github/workflows/infra-deploy.yml'

      - name: List modules with tests
        id: modules
        run: |
          modules=$(for d in infra/terraform/modules/*/; do
            name=$(basename "$d")
            if [ -d "${d}tests" ]; then echo "$name"; fi
          done | jq -R -s -c 'split("\n")[:-1]')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"

  fmt:
    name: Terraform fmt
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - run: terraform fmt -check -recursive infra/terraform

  validate:
    name: Terraform validate (${{ matrix.env }})
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        env: [staging, prod]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform validate — ${{ matrix.env }}
        working-directory: infra/terraform/envs/${{ matrix.env }}
        run: |
          terraform init -backend=false -input=false -lockfile=readonly
          terraform validate

  terraform-test:
    name: Terraform test (${{ matrix.module }})
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform init — ${{ matrix.module }}
        working-directory: infra/terraform/modules/${{ matrix.module }}
        run: terraform init -input=false -lockfile=readonly

      # Mocked providers (mock_provider "google" etc.) — needs no GCP
      # credentials, so this runs before any WIF auth step (Wave 2 preamble
      # rule). modules/pubsub's tests additionally read the real, committed
      # infra/terraform/pubsub-catalog.json via jsondecode(file(...)) rather
      # than a self-contained fixture (M17-S19 note) — works automatically
      # under this normal checkout, no special wiring needed.
      - name: terraform test — ${{ matrix.module }}
        working-directory: infra/terraform/modules/${{ matrix.module }}
        run: terraform test

  # tf-planner authenticates read-only; no `environment:` declared so PR
  # runs (any ref) can mint it — S08 WIF binding scopes tf-planner to
  # `attribute.repository` with no ref restriction, unlike tf-deployer.
  plan-staging:
    name: Terraform plan (staging)
    needs: [detect-changes, fmt, validate, terraform-test]
    if: |
      needs.detect-changes.outputs.infra == 'true' &&
      needs.fmt.result == 'success' &&
      needs.validate.result == 'success' &&
      needs.terraform-test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: infra-plan-staging-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    outputs:
      plan_summary: ${{ steps.plan.outputs.summary }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as tf-planner (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_PLANNER_SA_STAGING }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform plan — staging
        id: plan
        working-directory: infra/terraform/envs/staging
        env:
          TF_VAR_iam_admin_user: ${{ vars.IAM_ADMIN_USER }}
          TF_VAR_brevo_smtp_login: ${{ secrets.BREVO_SMTP_LOGIN }}
        run: |
          terraform init -input=false -lockfile=readonly
          terraform plan -input=false -no-color -lock-timeout=60s -out=tfplan
          terraform show -no-color tfplan > plan-output.txt
          terraform show -json tfplan > plan.json

          # Sanitized summary for the PR comment: resource addresses + action
          # verbs only, extracted from the structured JSON plan — never the
          # "before"/"after" attribute data. Verified empirically (isolated
          # test, 2026-07-21): terraform show -json's top-level `.variables`
          # key holds every input variable's RAW value, including sensitive
          # ones, even when that variable is only ever used in a provider
          # block and never becomes a resource attribute — `sensitive = true`
          # does not redact this section. The jq query below only ever reads
          # `.resource_changes[].address`/`.change.actions`, never `.variables`,
          # and plan.json/tfplan are deleted immediately below as defense in
          # depth (neither is uploaded or printed anywhere either way).
          total=$(jq '[.resource_changes[] | select(.change.actions != ["no-op"])] | length' plan.json)
          {
            echo "summary<<PLAN_SUMMARY_EOF"
            grep -E '^(Plan:|No changes)' plan-output.txt || echo "Plan: unable to summarize"
            echo ""
            jq -r '.resource_changes[] | select(.change.actions != ["no-op"]) | "- \(.change.actions | join(",")): \(.address)"' plan.json | head -50
            if [ "$total" -gt 50 ]; then
              echo "... and $((total - 50)) more (see job summary)"
            fi
            echo "PLAN_SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      # Separate step with if: always(), not the tail of the plan step above
      # — GitHub Actions bash steps run with `-e` by default, so if the jq
      # extraction had failed partway, a same-step `rm -f` at the very end
      # would never execute, leaving tfplan/plan.json (containing the raw
      # secret in `.variables`, see the plan step's comments) sitting on
      # the runner's disk until the job's teardown. This guarantees cleanup
      # regardless of the plan step's outcome.
      - name: Delete plan files
        if: always()
        working-directory: infra/terraform/envs/staging
        run: rm -f tfplan plan.json

      # Full plan output (resource names, CIDRs, SA emails — infra topology)
      # goes to the job summary only, never a PR comment — the repo is
      # public, and a job summary is meaningfully less discoverable than an
      # inline PR comment even though both are technically public (2026-07-08
      # decision, restated in story-discovery 2026-07-21). The PR comment
      # (pr-comment job) does get a sanitized address+action summary via
      # steps.plan.outputs.summary above — resource addresses only, never
      # attribute values (review finding, 2026-07-21).
      - name: Write plan to job summary
        if: always()
        run: |
          {
            echo "## Terraform Plan — staging"
            echo '```'
            cat infra/terraform/envs/staging/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Deliberately no "Upload plan artifact" step here — apply-staging
      # replans and applies fresh instead of reusing a saved plan, same as
      # apply-prod, even though none of staging's current variables are
      # `sensitive`. Kept symmetric with prod on purpose: if staging ever
      # gains its own sensitive variable later, the safe pattern is already
      # in place instead of depending on someone remembering to reconsider
      # this decision at that point — the exact trap that caused the
      # original finding (M17-S24 review, 2026-07-21).

  plan-prod:
    name: Terraform plan (prod)
    needs: [detect-changes, fmt, validate, terraform-test]
    if: |
      needs.detect-changes.outputs.infra == 'true' &&
      needs.fmt.result == 'success' &&
      needs.validate.result == 'success' &&
      needs.terraform-test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: infra-plan-prod-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    outputs:
      plan_summary: ${{ steps.plan.outputs.summary }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as tf-planner (prod)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_PLANNER_SA_PROD }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform plan — prod
        id: plan
        working-directory: infra/terraform/envs/prod
        env:
          TF_VAR_iam_admin_user: ${{ vars.IAM_ADMIN_USER }}
          TF_VAR_brevo_smtp_login: ${{ secrets.BREVO_SMTP_LOGIN }}
          # Genuine credential (Cloudflare API token) — Terraform's own
          # `sensitive = true` on this variable redacts it from *rendered*
          # plan output (terraform show, CLI text) and GitHub also masks
          # the raw secret value in logs. It does NOT redact the saved
          # binary plan file's contents. Even worse than a redacted-in-text
          # value: terraform show -json's top-level `.variables` key holds
          # this variable's RAW value in cleartext, verified empirically
          # (isolated test, 2026-07-21) — despite cloudflare_api_token only
          # ever being used in the provider block (providers.tf), never a
          # resource attribute. Neither tfplan nor plan.json ever gets
          # uploaded, printed, or included in the PR comment (see
          # infra/terraform/README.md § Public-repository security, and the
          # jq extraction + rm -f below).
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform init -input=false -lockfile=readonly
          terraform plan -input=false -no-color -lock-timeout=60s -out=tfplan
          terraform show -no-color tfplan > plan-output.txt
          terraform show -json tfplan > plan.json

          # Sanitized summary for the PR comment: resource addresses + action
          # verbs only, extracted from the structured JSON plan — never the
          # "before"/"after" attribute data or the `.variables` key (see the
          # env: block comment above for why `.variables` matters here).
          # The jq query below only ever reads `.resource_changes[].address`/
          # `.change.actions`; plan.json/tfplan are deleted immediately below
          # as defense in depth regardless.
          total=$(jq '[.resource_changes[] | select(.change.actions != ["no-op"])] | length' plan.json)
          {
            echo "summary<<PLAN_SUMMARY_EOF"
            grep -E '^(Plan:|No changes)' plan-output.txt || echo "Plan: unable to summarize"
            echo ""
            jq -r '.resource_changes[] | select(.change.actions != ["no-op"]) | "- \(.change.actions | join(",")): \(.address)"' plan.json | head -50
            if [ "$total" -gt 50 ]; then
              echo "... and $((total - 50)) more (see job summary)"
            fi
            echo "PLAN_SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      # Separate step with if: always(), same reasoning as plan-staging's
      # "Delete plan files" step — guarantees cleanup even if the jq
      # extraction above failed partway (bash steps run with -e by default).
      - name: Delete plan files
        if: always()
        working-directory: infra/terraform/envs/prod
        run: rm -f tfplan plan.json

      - name: Write plan to job summary
        if: always()
        run: |
          {
            echo "## Terraform Plan — prod"
            echo '```'
            cat infra/terraform/envs/prod/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Deliberately no "Upload plan artifact" step here (same as
      # plan-staging): this plan's TF_VAR_cloudflare_api_token is a genuine
      # credential, and Terraform's saved plan files store every variable's
      # real value in cleartext regardless of `sensitive` — `sensitive` only
      # redacts rendered CLI/summary output. A workflow artifact on this
      # public repo would make the token downloadable by anyone with read
      # access. apply-prod re-plans and applies fresh instead of reusing a
      # saved plan (see apply-prod's own comment for why that's still safe
      # from a review standpoint). Real finding, M17-S24 review, 2026-07-21.

  # Single required-check gate, matching the existing test-suite-passed
  # pattern (pr-tests.yml) — avoids naming every matrix leg (terraform-test,
  # validate) as its own required branch-protection context, which would
  # break every time a module gains/loses a tests/ dir.
  infra-pr-checks-passed:
    name: Infra PR Checks Passed
    needs: [detect-changes, fmt, validate, terraform-test, plan-staging, plan-prod]
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Allow-list, not deny-list: only "success" or "skipped" (the correct
      # no-op for a non-infra PR) satisfy the gate. Checking only for
      # "failure" would let a "cancelled" result — a real possibility, since
      # plan-staging/plan-prod use cancel-in-progress: true — slip through
      # as a false pass. Results are passed via env rather than expanded
      # directly into the run: script — GitHub-controlled values (job
      # results can only ever be success/failure/cancelled/skipped), but
      # routing through env keeps this immune to the whole class of
      # template-injection risk regardless (zizmor's template-injection
      # audit; also easier to read). Real finding, M17-S24 review, 2026-07-21.
      - name: Check results
        env:
          DETECT_CHANGES_RESULT: ${{ needs.detect-changes.result }}
          FMT_RESULT: ${{ needs.fmt.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          TERRAFORM_TEST_RESULT: ${{ needs.terraform-test.result }}
          PLAN_STAGING_RESULT: ${{ needs.plan-staging.result }}
          PLAN_PROD_RESULT: ${{ needs.plan-prod.result }}
        run: |
          failed=false
          for result in "$DETECT_CHANGES_RESULT" "$FMT_RESULT" "$VALIDATE_RESULT" \
                        "$TERRAFORM_TEST_RESULT" "$PLAN_STAGING_RESULT" "$PLAN_PROD_RESULT"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Found a non-passing result: $result"
              failed=true
            fi
          done
          if [ "$failed" = "true" ]; then
            echo "One or more infra PR checks did not pass."
            exit 1
          fi
          echo "All infra PR checks passed (or were correctly skipped for a non-infra change)."

  pr-comment:
    name: PR plan status comment
    needs: [detect-changes, plan-staging, plan-prod]
    if: always() && needs.detect-changes.outputs.infra == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write # marocchino/sticky-pull-request-comment needs this to create/update the PR comment
    steps:
      # PLAN_STAGING_SUMMARY/PLAN_PROD_SUMMARY are resource addresses + action
      # verbs + the top-line add/change/destroy counts only — generated by
      # plan-staging/plan-prod from the structured JSON plan, never from the
      # "before"/"after" attribute data (see those jobs' own comments). Full
      # attribute-level detail stays in the job summary only, not this
      # comment (2026-07-08 decision, partially revised 2026-07-21 to add
      # this bounded, values-free extract).
      - name: Build comment body
        env:
          PLAN_STAGING_RESULT: ${{ needs.plan-staging.result }}
          PLAN_PROD_RESULT: ${{ needs.plan-prod.result }}
          PLAN_STAGING_SUMMARY: ${{ needs.plan-staging.outputs.plan_summary }}
          PLAN_PROD_SUMMARY: ${{ needs.plan-prod.outputs.plan_summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "### Terraform Plan"
            echo ""
            echo "**Staging** (\`$PLAN_STAGING_RESULT\`)"
            echo '```'
            echo "$PLAN_STAGING_SUMMARY"
            echo '```'
            echo ""
            echo "**Prod** (\`$PLAN_PROD_RESULT\`)"
            echo '```'
            echo "$PLAN_PROD_SUMMARY"
            echo '```'
            echo ""
            echo "Resource addresses and actions only — no attribute values (CIDRs, SA emails, etc.), no plan artifact. Full plan output is in this run's [job summary]($RUN_URL) (public repo)."
          } > comment-body.md

      - uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: infra-plan-status
          path: comment-body.md

  # ---------------------------------------------------------------------
  # Merge to main: apply staging, then (after approval) apply prod
  # ---------------------------------------------------------------------

  apply-staging:
    name: Terraform apply (staging)
    needs: [detect-changes, plan-staging]
    if: needs.detect-changes.outputs.infra == 'true' && github.event_name == 'push' && needs.plan-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging-infrastructure
    concurrency:
      group: staging-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as tf-deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_STAGING }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform apply — staging
        working-directory: infra/terraform/envs/staging
        env:
          TF_VAR_iam_admin_user: ${{ vars.IAM_ADMIN_USER }}
          TF_VAR_brevo_smtp_login: ${{ secrets.BREVO_SMTP_LOGIN }}
        run: |
          terraform init -input=false -lockfile=readonly
          terraform apply -input=false -lock-timeout=60s -auto-approve

  apply-prod:
    name: Terraform apply (prod)
    # Both apply jobs re-plan and apply fresh rather than reusing a saved
    # plan artifact — plan-staging/plan-prod deliberately never upload
    # their plans (see plan-prod's own comment: kept symmetric with staging
    # even though only prod's TF_VAR_cloudflare_api_token is currently a
    # genuine credential, since saved plan files store every variable's
    # real value in cleartext regardless of `sensitive`, and this way a
    # future sensitive variable added to either env is already safe by
    # default). The reviewer's review material is still plan-prod's job
    # summary output, already posted
    # earlier in this same push, before this job even entered the "waiting
    # for review" state — GitHub does not start a protected-environment
    # job's steps until after approval, so there is no way for this job's
    # own log to show a plan *before* that approval happens. A small
    # TOCTOU gap (state could theoretically drift between plan-prod and
    # this apply) is an acceptable, low-probability trade for never
    # persisting a credential-bearing artifact on a public repo.
    needs: [detect-changes, plan-prod, apply-staging]
    if: needs.detect-changes.outputs.infra == 'true' && github.event_name == 'push' && needs.plan-prod.result == 'success' && needs.apply-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-infrastructure
    concurrency:
      group: production-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as tf-deployer (prod)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_PROD }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform apply — prod
        working-directory: infra/terraform/envs/prod
        env:
          TF_VAR_iam_admin_user: ${{ vars.IAM_ADMIN_USER }}
          TF_VAR_brevo_smtp_login: ${{ secrets.BREVO_SMTP_LOGIN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform init -input=false -lockfile=readonly
          terraform apply -input=false -lock-timeout=60s -auto-approve

  # ---------------------------------------------------------------------
  # Weekly drift detection (read-only, tf-planner) + on-demand re-run
  # ---------------------------------------------------------------------

  drift-staging:
    name: Drift check (staging)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as tf-planner (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_PLANNER_SA_STAGING }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      # -detailed-exitcode: 0 = no changes, 1 = error, 2 = changes present.
      # terraform_wrapper: false above is required for this exit code to
      # reach the shell unmodified.
      - name: terraform plan -detailed-exitcode — staging
        working-directory: infra/terraform/envs/staging
        env:
          TF_VAR_iam_admin_user: ${{ vars.IAM_ADMIN_USER }}
          TF_VAR_brevo_smtp_login: ${{ secrets.BREVO_SMTP_LOGIN }}
        run: |
          terraform init -input=false -lockfile=readonly
          terraform plan -input=false -no-color -lock-timeout=60s -detailed-exitcode

  drift-prod:
    name: Drift check (prod)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # mints the short-lived WIF token for google-github-actions/auth
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as tf-planner (prod)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_PLANNER_SA_PROD }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform plan -detailed-exitcode — prod
        working-directory: infra/terraform/envs/prod
        env:
          TF_VAR_iam_admin_user: ${{ vars.IAM_ADMIN_USER }}
          TF_VAR_brevo_smtp_login: ${{ secrets.BREVO_SMTP_LOGIN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform init -input=false -lockfile=readonly
          terraform plan -input=false -no-color -lock-timeout=60s -detailed-exitcode

      # TD27: gs://ikaro-tfstate's own security posture (versioning, uniform
      # access, public access prevention, the env-scoped IAM conditions) was
      # bootstrapped out-of-band (M17-S08) and is not a Terraform resource —
      # the plan step above can never detect drift on the bucket itself. This
      # reuses the same read-only tf-planner-prod credentials (already has
      # storage.buckets.get + storage.buckets.getIamPolicy — no new IAM grant)
      # instead of bringing the bucket under normal envs/prod management,
      # which would need tf-deployer-prod write access to the bucket —
      # exactly what M17-S08's negative-condition fix deliberately removed.
      # `if: always()` so this still runs even when the plan step above
      # already found Terraform-managed drift and exited non-zero.
      #
      # Public-repo discipline (this workflow's logs are public): every
      # assertion below prints only PASS/FAIL by name, never a raw bucket
      # config value or IAM policy — see state-bucket-expected-config.json's
      # header comment for the review discipline expected of future edits.
      - name: Verify state bucket security (TD27)
        if: always()
        working-directory: infra/terraform
        run: |
          set -uo pipefail
          EXPECTED="state-bucket-expected-config.json"
          BUCKET="$(jq -r '.bucket' "$EXPECTED")"
          PROJECT="$(jq -r '.project' "$EXPECTED")"
          FAIL=0

          BUCKET_JSON="$(gcloud storage buckets describe "gs://${BUCKET}" --format=json)"
          for field in versioning_enabled uniform_bucket_level_access public_access_prevention; do
            expected="$(jq -r ".expected.${field}" "$EXPECTED")"
            actual="$(jq -r ".${field}" <<<"$BUCKET_JSON")"
            if [ "$expected" != "$actual" ]; then
              echo "FAIL: bucket.${field} does not match the expected value"
              FAIL=1
            else
              echo "PASS: bucket.${field}"
            fi
          done

          BUCKET_IAM_JSON="$(gcloud storage buckets get-iam-policy "gs://${BUCKET}" --format=json)"

          for forbidden in $(jq -r '.forbiddenBucketIamMembers[]' "$EXPECTED"); do
            if jq -e --arg m "$forbidden" '.bindings[]?.members[]? | select(. == $m)' <<<"$BUCKET_IAM_JSON" >/dev/null; then
              echo "FAIL: bucket IAM policy grants a forbidden public member (${forbidden})"
              FAIL=1
            else
              echo "PASS: no forbidden public member (${forbidden}) on bucket IAM policy"
            fi
          done

          # Bidirectional allow-list check: every allow-listed binding must be
          # present (catches removal/weakening) AND every live binding must
          # be allow-listed (catches an unexpected addition — e.g. a new
          # grant to an unrelated principal, which a presence-only check can
          # never see).
          allowed_count="$(jq '.allowedBucketIamBindings | length' "$EXPECTED")"
          for i in $(seq 0 $((allowed_count - 1))); do
            role="$(jq -r ".allowedBucketIamBindings[$i].role" "$EXPECTED")"
            member="$(jq -r ".allowedBucketIamBindings[$i].member" "$EXPECTED")"
            cond="$(jq -r ".allowedBucketIamBindings[$i].conditionExpression // \"\"" "$EXPECTED")"
            if ! jq -e --arg role "$role" --arg member "$member" --arg cond "$cond" \
              '.bindings[]? | select(.role == $role and (.members[]? == $member) and (.condition.expression // "") == $cond)' \
              <<<"$BUCKET_IAM_JSON" >/dev/null; then
              echo "FAIL: expected bucket IAM binding missing (role=${role} member=${member})"
              FAIL=1
            fi
          done
          echo "PASS/FAIL summarized above for each of the ${allowed_count} allow-listed bucket IAM bindings"

          ALLOWED_JSON="$(jq -c '.allowedBucketIamBindings' "$EXPECTED")"
          unexpected_count="$(jq --argjson allow "$ALLOWED_JSON" '
            [ .bindings[]? as $b
              | $b.members[]? as $m
              | select(
                  ([$allow[] | select(.role == $b.role and .member == $m and ((.conditionExpression // "") == ($b.condition.expression // "")))] | length) == 0
                )
            ] | length' <<<"$BUCKET_IAM_JSON")"
          if [ "$unexpected_count" -gt 0 ]; then
            echo "FAIL: bucket IAM policy grants ${unexpected_count} binding(s) not in the allow-list"
            FAIL=1
          else
            echo "PASS: no unexpected (non-allow-listed) bucket IAM bindings"
          fi

          PROJECT_IAM_JSON="$(gcloud projects get-iam-policy "${PROJECT}" --format=json)"

          # Checked for exact uniqueness, not just presence: GCP IAM
          # evaluates bindings additively (OR), so an extra permissive
          # binding for the same role+member would defeat this one even
          # while it remains present — count must be exactly 1.
          project_binding_count="$(jq '.requiredProjectIamBindings | length' "$EXPECTED")"
          for i in $(seq 0 $((project_binding_count - 1))); do
            name="$(jq -r ".requiredProjectIamBindings[$i].name" "$EXPECTED")"
            role="$(jq -r ".requiredProjectIamBindings[$i].role" "$EXPECTED")"
            member="$(jq -r ".requiredProjectIamBindings[$i].member" "$EXPECTED")"
            cond="$(jq -r ".requiredProjectIamBindings[$i].conditionExpression" "$EXPECTED")"

            matching_count="$(jq --arg role "$role" --arg member "$member" \
              '[.bindings[]? | select(.role == $role and (.members[]? == $member))] | length' \
              <<<"$PROJECT_IAM_JSON")"
            exact_match="no"
            if jq -e --arg role "$role" --arg member "$member" --arg cond "$cond" \
              '.bindings[]? | select(.role == $role and (.members[]? == $member) and (.condition.expression // "") == $cond)' \
              <<<"$PROJECT_IAM_JSON" >/dev/null; then
              exact_match="yes"
            fi

            if [ "$matching_count" -eq 0 ]; then
              echo "FAIL: required project IAM binding missing (${name})"
              FAIL=1
            elif [ "$matching_count" -eq 1 ] && [ "$exact_match" = "yes" ]; then
              echo "PASS: required project IAM binding present and unique (${name})"
            elif [ "$matching_count" -eq 1 ] && [ "$exact_match" = "no" ]; then
              echo "FAIL: required project IAM binding present but with an unexpected condition (${name})"
              FAIL=1
            else
              echo "FAIL: unexpected additional binding(s) for the same role+member as (${name}) — found ${matching_count}, expected exactly 1"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "State bucket security check FAILED — see the named PASS/FAIL lines above."
            exit 1
          fi
          echo "State bucket security check: all assertions passed."
