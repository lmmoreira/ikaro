name: PR — Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snyk-sca:
    name: Snyk SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 11.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Snyk SCA — all workspaces
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          args: --severity-threshold=high --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy-scan:
    name: Trivy Image Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: apps/backend/Dockerfile
          - service: bff
            dockerfile: apps/bff/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: docker buildx create --use --driver docker-container

      - name: Build ${{ matrix.service }} image
        run: |
          docker buildx build \
            --cache-from type=gha,scope=trivy-${{ matrix.service }} \
            --cache-to type=gha,scope=trivy-${{ matrix.service }},mode=max \
            --load \
            -f ${{ matrix.dockerfile }} \
            -t ikaro-${{ matrix.service }}:scan \
            .

      - name: Trivy scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ikaro-${{ matrix.service }}:scan
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # Regression-proof the TD07 fix: verify no .env* file (other than .env.example)
      # was baked into the image by a misconfigured .dockerignore or pnpm deploy.
      # Matches the same wildcard as the ignore patterns (.env.local, .env.production,
      # etc.) — not just a literal .env. Runs on a fresh checkout (no local .env
      # present), so a failure here means the exclusion pattern itself broke.
      - name: Env-leak check — ${{ matrix.service }}
        run: |
          LEAKED=$(docker run --rm --entrypoint sh "ikaro-${{ matrix.service }}:scan" \
            -c 'find /app -name ".env*" -not -name ".env.example" 2>/dev/null || true')
          if [ -n "$LEAKED" ]; then
            echo "❌ .env* file found inside the ${{ matrix.service }} image:"
            echo "$LEAKED"
            exit 1
          fi
          echo "✅ No .env* files found inside the ${{ matrix.service }} image"

      # Catches a class of bug Trivy can't see: docker build succeeding and the
      # filesystem scanning clean doesn't mean `node dist/main.js` resolves its own
      # require() graph — see TD06. No DB/Pub/Sub emulator needed: the crash this
      # targets happens at module-resolution time, synchronously, before any network
      # call backend/bff would attempt at boot.
      - name: Boot smoke test — ${{ matrix.service }}
        run: |
          ARGS=(--name "smoke-${{ matrix.service }}" -d)
          case "${{ matrix.service }}" in
            backend)
              ARGS+=(
                -e JWT_SECRET="$(openssl rand -hex 32)"
                -e PLATFORM_ADMIN_KEY="$(openssl rand -hex 32)"
                -e INTERNAL_API_KEY="$(openssl rand -hex 32)"
                -e HOTSITE_REVALIDATE_SECRET="$(openssl rand -hex 32)"
                -e DB_HOST=localhost -e DB_USER=ikaro_app -e DB_PASSWORD=ikaro_app -e DB_NAME=ikaro
              )
              ;;
            bff)
              ARGS+=(
                -e JWT_SECRET="$(openssl rand -hex 32)"
                -e CRON_SECRET="$(openssl rand -hex 32)"
                -e INTERNAL_API_KEY="$(openssl rand -hex 32)"
                -e BACKEND_INTERNAL_URL=http://localhost:3001
                -e GOOGLE_CLIENT_ID=smoke-test
                -e GOOGLE_CLIENT_SECRET=smoke-test
                -e GOOGLE_CALLBACK_URL=http://localhost:3002/v1/auth/google/callback
              )
              ;;
          esac
          docker run "${ARGS[@]}" "ikaro-${{ matrix.service }}:scan"
          sleep 5
          docker logs "smoke-${{ matrix.service }}"
          STATUS=$(docker inspect "smoke-${{ matrix.service }}" --format='{{.State.Status}}')
          docker rm -f "smoke-${{ matrix.service }}"
          if [ "$STATUS" != "running" ]; then
            echo "❌ Container exited instead of staying up — see logs above"
            exit 1
          fi
          echo "✅ Container booted and is still running"

  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            terraform:
              - 'infrastructure/terraform/**'

      - name: Checkov — Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: infrastructure/terraform
          soft_fail: false
          quiet: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: steps.filter.outputs.terraform == 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
