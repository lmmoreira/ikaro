name: PR — Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snyk-sca:
    name: Snyk SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Snyk SCA — all workspaces
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy-scan:
    name: Trivy Image Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: apps/backend/Dockerfile
          - service: bff
            dockerfile: apps/bff/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: docker build -f ${{ matrix.dockerfile }} -t ikaro-${{ matrix.service }}:scan .

      - name: Trivy scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ikaro-${{ matrix.service }}:scan
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'infrastructure/terraform/**'

      - name: Checkov — Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform
          soft_fail: false
          quiet: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: steps.filter.outputs.terraform == 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
