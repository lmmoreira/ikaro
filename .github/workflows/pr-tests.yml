name: PR — Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 11.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @ikaro/backend test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage/lcov.info
          retention-days: 7

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 11.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm --filter @ikaro/backend test:integration
        env:
          TESTCONTAINERS_REUSE_ENABLE: 'true'

  bff-unit:
    name: BFF Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 11.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @ikaro/bff test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: bff-coverage
          path: apps/bff/coverage/lcov.info
          retention-days: 7

  web-unit:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 11.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @ikaro/web test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/lcov.info
          retention-days: 7

  bff-component:
    name: BFF Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 11.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # ConfigModule.forRoot({ validate: validateEnv }) runs synchronously the moment
      # app.module.ts is imported (transitively, at the top of every *.component.spec.ts
      # file) — before component-test.helpers.ts's createTestApp() body ever executes.
      # Its later process.env[...] assignments are too late for this validation; these
      # vars must already be present in the real process env. See CI_TRAPS.md.
      - name: Run component tests
        run: pnpm --filter @ikaro/bff test:component
        env:
          JWT_SECRET: 'test-secret-must-be-at-least-64-chars-long-xxxxxxxxxxxxxxxxxxxxxxxxxxxx'
          BACKEND_INTERNAL_URL: 'https://backend-test:3001'
          FRONTEND_URL: 'http://localhost:3000'
          JWT_EXPIRES_IN: '7d'
          GOOGLE_CLIENT_ID: 'test-client-id'
          GOOGLE_CLIENT_SECRET: 'test-client-secret'
          GOOGLE_CALLBACK_URL: 'http://localhost:3002/v1/auth/google/callback'
          ALLOWED_ORIGINS: 'http://localhost:3000'
          CRON_SECRET: 'test-cron-secret-must-be-at-least-32-chars!!'
          INTERNAL_API_KEY: 'test-internal-key-test-internal-key'
          ENABLE_DEV_AUTH: 'true'

  sonar:
    name: SonarCloud Analysis
    needs: [backend-unit, bff-unit, web-unit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 11.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download backend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-coverage
          path: apps/backend/coverage/

      - name: Download BFF coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bff-coverage
          path: apps/bff/coverage/

      - name: Download web coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-coverage
          path: apps/web/coverage/

      - name: Generate remaining coverage (observability + env-validation)
        run: |
          pnpm --filter @ikaro/observability test:cov
          pnpm --filter @ikaro/env-validation test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail on any new SonarCloud issue
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          RESULT=$(curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=lmmoreira_ikaro&pullRequest=${PR}&statuses=OPEN,CONFIRMED&ps=50")
          COUNT=$(echo "$RESULT" | jq '.total')
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ ${COUNT} new SonarCloud issue(s) — fix before merging:"
            echo "$RESULT" | jq -r '.issues[] | "  [\(.severity)] \(.message) — \(.component | split(":")[1]):\(.line // "?")"'
            exit 1
          fi
          echo "✅ No new SonarCloud issues."
