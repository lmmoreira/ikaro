name: PR — Quality And Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Gate for the whole app test suite (unit/integration/component/e2e,
  # Sonar, Dependency Review, Trivy) — a PR touching only infra/terraform/**
  # or workflow files unrelated to this pipeline skips all of it, same
  # principle as infra-deploy.yml's own detect-changes job. Deliberately
  # coarse (any app/shared-package change re-runs the whole suite, same as
  # today) rather than split per-app: that would need each app-specific job
  # to also fire on every shared packages/** path, and would break sonar's
  # unconditional download of all three coverage artifacts unless it also
  # tracked exactly which subset ran — not worth the complexity for a CI
  # cost optimization (M17-S24 discussion, 2026-07-21).
  detect-changes:
    name: Detect app changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect app-relevant changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            app:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.nvmrc'
              - 'docker/**'
              - '.github/workflows/pr-tests.yml'
              - '.github/workflows/pr-quality.yml'

  backend-unit:
    name: Backend Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @ikaro/backend test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: apps/backend/coverage/lcov.info
          retention-days: 7

  backend-integration:
    name: Backend Integration Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm --filter @ikaro/backend test:integration
        env:
          TESTCONTAINERS_REUSE_ENABLE: 'true'

  bff-unit:
    name: BFF Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @ikaro/bff test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bff-coverage
          path: apps/bff/coverage/lcov.info
          retention-days: 7

  web-unit:
    name: Web Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @ikaro/web test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage
          path: apps/web/coverage/lcov.info
          retention-days: 7

  bff-component:
    name: BFF Component Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # ConfigModule.forRoot({ validate: validateEnv }) runs synchronously the moment
      # app.module.ts is imported (transitively, at the top of every *.component.spec.ts
      # file) — before component-test.helpers.ts's createTestApp() body ever executes.
      # Its later process.env[...] assignments are too late for this validation; these
      # vars must already be present in the real process env. See CI_TRAPS.md.
      - name: Run component tests
        run: pnpm --filter @ikaro/bff test:component
        env:
          JWT_SECRET: 'test-secret-must-be-at-least-64-chars-long-xxxxxxxxxxxxxxxxxxxxxxxxxxxx'
          BACKEND_INTERNAL_URL: 'https://backend-test:3001'
          FRONTEND_URL: 'http://localhost:3000'
          JWT_EXPIRES_IN: '7d'
          GOOGLE_CLIENT_ID: 'test-client-id'
          GOOGLE_CLIENT_SECRET: 'test-client-secret'
          GOOGLE_CALLBACK_URL: 'http://localhost:3002/v1/auth/google/callback'
          ALLOWED_ORIGINS: 'http://localhost:3000'
          CRON_SECRET: 'test-cron-secret-must-be-at-least-32-chars!!'
          INTERNAL_API_KEY: 'test-internal-key-test-internal-key'
          ENABLE_DEV_AUTH: 'true'

  e2e:
    name: Playwright E2E
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Start infrastructure (postgres, pubsub, gcs, mailhog)
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for postgres
        run: |
          retries=30
          until docker compose -f docker/docker-compose.yml exec -T postgres \
            pg_isready -U postgres -d ikaro; do
            retries=$((retries - 1))
            if [ "$retries" -le 0 ]; then
              echo "Postgres did not become ready in time"
              docker compose -f docker/docker-compose.yml logs postgres
              exit 1
            fi
            sleep 2
          done

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ikaro_app
          DB_PASSWORD: ikaro_app
          DB_NAME: ikaro
          DB_MIGRATOR_USER: ikaro_migrator
          DB_MIGRATOR_PASSWORD: ikaro_migrator
          PUBSUB_EMULATOR_HOST: localhost:8085
          PUBSUB_PROJECT_ID: ikaro-local

      - name: Seed database
        run: pnpm db:seed
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ikaro_app
          DB_PASSWORD: ikaro_app
          DB_NAME: ikaro
          DB_MIGRATOR_USER: ikaro_migrator
          DB_MIGRATOR_PASSWORD: ikaro_migrator
          PUBSUB_EMULATOR_HOST: localhost:8085
          PUBSUB_PROJECT_ID: ikaro-local
          PUBSUB_AUTO_CREATE: 'true'
          GCS_EMULATOR_HOST: 'http://localhost:4443'
          GCS_BUCKET_NAME: ikaro-local
          GCS_PUBLIC_BUCKET_NAME: ikaro-local-public
          GCS_PUBLIC_BASE_URL: 'http://localhost:4443'
          GCS_KEY_FILE: ../../docker/fake-service-account.json
          EMAIL_ADAPTER: mailhog
          EMAIL_FROM: noreply@ikaro.example
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          JWT_SECRET: 'e2e-ci-jwt-secret-must-be-at-least-64-characters-long-xxxxxxxxxxxxx'
          PLATFORM_ADMIN_KEY: 'e2e-ci-platform-admin-key-must-be-32-chars!!'
          INTERNAL_API_KEY: 'e2e-ci-internal-api-key-must-be-32-chars!!'
          FRONTEND_URL: 'http://localhost:3000'
          HOTSITE_REVALIDATE_SECRET: 'e2e-ci-revalidate-secret-must-be-32ch!!'
          ENABLE_DEV_AUTH: 'true'

      # All three apps are started and awaited in a single step so their
      # background processes share one shell lifetime and cannot be reaped
      # when an earlier step's shell exits.
      - name: Start services and wait for readiness
        timeout-minutes: 8
        env:
          NODE_ENV: development
          PORT: '3001'
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: ikaro_app
          DB_PASSWORD: ikaro_app
          DB_NAME: ikaro
          DB_MIGRATOR_USER: ikaro_migrator
          DB_MIGRATOR_PASSWORD: ikaro_migrator
          PUBSUB_EMULATOR_HOST: localhost:8085
          PUBSUB_PROJECT_ID: ikaro-local
          PUBSUB_AUTO_CREATE: 'true'
          PUBSUB_MAX_DELIVERY_ATTEMPTS: '5'
          GCS_EMULATOR_HOST: 'http://localhost:4443'
          GCS_BUCKET_NAME: ikaro-local
          GCS_PUBLIC_BUCKET_NAME: ikaro-local-public
          GCS_PUBLIC_BASE_URL: 'http://localhost:4443'
          GCS_KEY_FILE: ../../docker/fake-service-account.json
          GCS_MAX_UPLOAD_BYTES: '10485760'
          EMAIL_ADAPTER: mailhog
          EMAIL_FROM: noreply@ikaro.example
          SMTP_HOST: localhost
          SMTP_PORT: '1025'
          JWT_SECRET: 'e2e-ci-jwt-secret-must-be-at-least-64-characters-long-xxxxxxxxxxxxx'
          PLATFORM_ADMIN_KEY: 'e2e-ci-platform-admin-key-must-be-32-chars!!'
          INTERNAL_API_KEY: 'e2e-ci-internal-api-key-must-be-32-chars!!'
          FRONTEND_URL: 'http://localhost:3000'
          HOTSITE_REVALIDATE_SECRET: 'e2e-ci-revalidate-secret-must-be-32ch!!'
          ENABLE_DEV_AUTH: 'true'
          BACKEND_INTERNAL_URL: 'http://localhost:3001'
          JWT_EXPIRES_IN: 7d
          GOOGLE_CLIENT_ID: e2e-test-client-id
          GOOGLE_CLIENT_SECRET: e2e-test-client-secret
          GOOGLE_CALLBACK_URL: 'http://localhost:3002/v1/auth/google/callback'
          ALLOWED_ORIGINS: 'http://localhost:3000'
          CRON_SECRET: 'e2e-ci-cron-secret-must-be-at-least-32-chars!!'
          NEXT_PUBLIC_BFF_URL: 'http://localhost:3002/v1'
          NEXT_PUBLIC_HOTSITE_IMAGE_BASE_URL: 'http://localhost:4443/ikaro-local-public'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
        run: |
          set -e

          pnpm --filter @ikaro/backend dev > /tmp/backend.log 2>&1 &
          PORT=3002 pnpm --filter @ikaro/bff dev > /tmp/bff.log 2>&1 &
          pnpm --filter @ikaro/web dev > /tmp/web.log 2>&1 &

          pnpm exec wait-on \
            tcp:localhost:3001 \
            tcp:localhost:3002 \
            tcp:localhost:3000 \
            --timeout 180000 \
            --interval 2000 \
          || {
            echo "=== Listening ports ==="
            ss -tlnp 2>/dev/null || true
            echo "=== Backend log (last 30 lines) ==="
            tail -30 /tmp/backend.log || true
            echo "=== BFF log (last 30 lines) ==="
            tail -30 /tmp/bff.log || true
            echo "=== Web log (last 30 lines) ==="
            tail -30 /tmp/web.log || true
            exit 1
          }
          echo "All services ready ✓"

      - name: Install Playwright browsers
        run: pnpm --filter @ikaro/web exec playwright install chromium --with-deps

      - name: Run Playwright E2E
        run: pnpm --filter @ikaro/web e2e:ci
        env:
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
          INTERNAL_API_KEY: 'e2e-ci-internal-api-key-must-be-32-chars!!'
          JWT_SECRET: 'e2e-ci-jwt-secret-must-be-at-least-64-characters-long-xxxxxxxxxxxxx'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 1

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 1

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-logs
          path: |
            /tmp/backend.log
            /tmp/bff.log
            /tmp/web.log
          retention-days: 1

  test-suite-passed:
    name: Test Suite Passed
    needs:
      [detect-changes, backend-unit, backend-integration, bff-unit, web-unit, bff-component, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Allow-list, not deny-list: only "success" or "skipped" (the correct
      # no-op for a PR that touches nothing under apps/**/packages/**/etc.)
      # satisfy the gate. Checking only for "failure" would let a
      # "cancelled" result slip through as a false pass. This job itself
      # always runs (no if: condition) so it stays a reliable required
      # check regardless of what detect-changes found. Same pattern as
      # infra-deploy.yml's Infra PR Checks Passed (M17-S24, 2026-07-21).
      - name: Check results
        env:
          BACKEND_UNIT_RESULT: ${{ needs.backend-unit.result }}
          BACKEND_INTEGRATION_RESULT: ${{ needs.backend-integration.result }}
          BFF_UNIT_RESULT: ${{ needs.bff-unit.result }}
          WEB_UNIT_RESULT: ${{ needs.web-unit.result }}
          BFF_COMPONENT_RESULT: ${{ needs.bff-component.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          failed=false
          for result in "$BACKEND_UNIT_RESULT" "$BACKEND_INTEGRATION_RESULT" "$BFF_UNIT_RESULT" \
                        "$WEB_UNIT_RESULT" "$BFF_COMPONENT_RESULT" "$E2E_RESULT"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Found a non-passing result: $result"
              failed=true
            fi
          done
          if [ "$failed" = "true" ]; then
            echo "One or more PR test jobs did not pass."
            exit 1
          fi
          echo "All PR test jobs passed (or were correctly skipped for a non-app change)."

  sonar:
    name: SonarCloud Analysis
    needs: [detect-changes, test-suite-passed, backend-unit, bff-unit, web-unit]
    # test-suite-passed's own allow-list already resolves "backend/bff/web
    # unit tests either succeeded or were correctly skipped" into one
    # success/failure verdict — checking it alone here is sufficient and
    # avoids re-deriving that logic. Skips entirely when no app code
    # changed: nothing new for Sonar to analyze, and its own coverage
    # artifacts wouldn't exist to download otherwise (M17-S24, 2026-07-21).
    # `always()` added 2026-07-23 as a defensive measure, matching the
    # gitleaks/checkov/snyk-sca/trivy-scan fix above — this job's `needs:`
    # also lists backend-unit/bff-unit/web-unit directly (both skippable),
    # not just test-suite-passed, so belt-and-suspenders against the same
    # transitive-skip class of bug even though this job's own explicit
    # condition (not a bare default) was likely already immune to it.
    if: always() && needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download backend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-coverage
          path: apps/backend/coverage/

      - name: Download BFF coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bff-coverage
          path: apps/bff/coverage/

      - name: Download web coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-coverage
          path: apps/web/coverage/

      - name: Generate remaining coverage (observability + env-validation)
        run: |
          pnpm --filter @ikaro/observability test:cov
          pnpm --filter @ikaro/env-validation test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail on any new SonarCloud issue
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          RESULT=$(curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=lmmoreira_ikaro&pullRequest=${PR}&statuses=OPEN,CONFIRMED&ps=50")
          COUNT=$(echo "$RESULT" | jq '.total')
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ ${COUNT} new SonarCloud issue(s) — fix before merging:"
            echo "$RESULT" | jq -r '.issues[] | "  [\(.severity)] \(.message) — \(.component | split(":")[1]):\(.line // "?")"'
            exit 1
          fi
          echo "✅ No new SonarCloud issues."

  dependency-review:
    name: Dependency Review
    needs: [detect-changes, test-suite-passed]
    # `always()` — same defensive reasoning as sonar's identical comment
    # above (2026-07-23).
    if: always() && needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  gitleaks:
    name: Gitleaks Secret Scan
    needs: [test-suite-passed]
    # Explicit `always()` (2026-07-23 discovery, verified against real PR
    # #192): the implicit default `if: success()` does NOT reliably
    # resolve to true here even when test-suite-passed's own conclusion
    # IS success — GitHub Actions propagates a "skipped" status through
    # the graph from test-suite-passed's own (legitimately skipped)
    # upstream jobs (backend-unit etc. on an infra-only PR), and a bare
    # default condition inherits that, silently skipping this job even
    # though its direct need succeeded. `always()` breaks that inheritance;
    # the explicit result check after it still correctly refuses to run if
    # test-suite-passed genuinely failed. Secret scanning has no app/infra
    # distinction — every PR gets scanned regardless of what changed.
    if: always() && needs.test-suite-passed.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snyk-sca:
    name: Snyk SCA
    needs: [test-suite-passed]
    # Same transitive-skip fix as gitleaks above — see its comment. This
    # job always starts (whenever tests passed); its own internal
    # steps.filter.outputs.deps check (below) decides whether the real
    # scan runs, same pattern as checkov's terraform filter.
    if: always() && needs.test-suite-passed.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect dependency changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            deps:
              - '**/package.json'
              - '**/pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: steps.filter.outputs.deps == 'true'
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.filter.outputs.deps == 'true'
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
        if: steps.filter.outputs.deps == 'true'

      - name: Snyk SCA — all workspaces
        if: steps.filter.outputs.deps == 'true'
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          args: --severity-threshold=high --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy-scan:
    name: Trivy Image Scan (${{ matrix.service }})
    needs: [detect-changes, test-suite-passed]
    # CORRECTED 2026-07-23 (superseding the 2026-07-22 fix comment this
    # replaces): the original theory — "a job-level if: combined with a
    # matrix collapses the whole strategy into one synthetic skipped check,
    # because if: is evaluated before matrix expansion" — was a
    # misdiagnosis. Proof: this job has had NO job-level `if:` at all since
    # that 2026-07-22 fix, yet the exact same collapse into
    # "Trivy Image Scan (${{ matrix.service }})" was reconfirmed live on PR
    # #192 (2026-07-23), with no job-level if present. The real mechanism:
    # the implicit default `if: success()` (what a job gets when no if: is
    # specified) doesn't just check this job's DIRECT needs — a "skipped"
    # status from further back in the graph (backend-unit etc., skipped on
    # an infra-only PR) propagates through test-suite-passed to this job
    # too, DESPITE test-suite-passed's own if: always() resolving its own
    # conclusion to genuine "success". The job never starts at all, so the
    # matrix never gets a chance to expand — same root cause as
    # gitleaks/checkov/snyk-sca above, just with a worse symptom (a
    # collapsed matrix name instead of a single missing check) because a
    # matrix job's identity IS the substituted name. The actual fix: an
    # EXPLICIT `always() && needs.test-suite-passed.result == 'success'`
    # breaks the propagation (mirrors the other jobs above) — this runs the
    # job (and expands the matrix into three correctly-named checks)
    # whenever test-suite-passed genuinely succeeded, regardless of what
    # its own ancestors did. Each step's existing
    # `detect-changes.outputs.app` check still correctly no-ops the real
    # work on an infra-only PR.
    if: always() && needs.test-suite-passed.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: apps/backend/Dockerfile
          - service: bff
            dockerfile: apps/bff/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Required for `docker buildx build`'s type=gha cache backend when
      # invoked directly in a run: step (not via docker/build-push-action):
      # ACTIONS_RUNTIME_TOKEN/cache endpoint vars exist on the runner but
      # are not exposed to plain run: steps by default — without this,
      # --cache-from/--cache-to type=gha fails silently and every build is
      # a full rebuild (Docker's own docs; review finding, 2026-07-22,
      # M17-S25 — this job had the same gap deploy-staging.yml's build
      # jobs were caught with).
      - name: Expose GitHub Actions runtime for GHA cache backend
        if: needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Set up Docker Buildx
        if: needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
        run: docker buildx create --use --driver docker-container

      - name: Build ${{ matrix.service }} image
        if: needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
        run: |
          docker buildx build \
            --cache-from type=gha,scope=trivy-${{ matrix.service }} \
            --cache-to type=gha,scope=trivy-${{ matrix.service }},mode=max \
            --load \
            -f ${{ matrix.dockerfile }} \
            -t ikaro-${{ matrix.service }}:scan \
            .

      - name: Trivy scan — ${{ matrix.service }}
        if: needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ikaro-${{ matrix.service }}:scan
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Env-leak check — ${{ matrix.service }}
        if: needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
        run: |
          LEAKED=$(docker run --rm --entrypoint sh "ikaro-${{ matrix.service }}:scan" \
            -c 'find /app -name ".env*" -not -name ".env.example" 2>/dev/null || true')
          if [ -n "$LEAKED" ]; then
            echo "❌ .env* file found inside the ${{ matrix.service }} image:"
            echo "$LEAKED"
            exit 1
          fi
          echo "✅ No .env* files found inside the ${{ matrix.service }} image"

      - name: Boot smoke test — ${{ matrix.service }}
        if: needs.test-suite-passed.result == 'success' && needs.detect-changes.outputs.app == 'true'
        run: |
          ARGS=(--name "smoke-${{ matrix.service }}" -d)
          case "${{ matrix.service }}" in
            backend)
              ARGS+=(
                -e JWT_SECRET="$(openssl rand -hex 32)"
                -e PLATFORM_ADMIN_KEY="$(openssl rand -hex 32)"
                -e INTERNAL_API_KEY="$(openssl rand -hex 32)"
                -e HOTSITE_REVALIDATE_SECRET="$(openssl rand -hex 32)"
                -e DB_HOST=localhost -e DB_USER=ikaro_app -e DB_PASSWORD=ikaro_app -e DB_NAME=ikaro
              )
              ;;
            bff)
              ARGS+=(
                -e JWT_SECRET="$(openssl rand -hex 32)"
                -e CRON_SECRET="$(openssl rand -hex 32)"
                -e INTERNAL_API_KEY="$(openssl rand -hex 32)"
                -e BACKEND_INTERNAL_URL=http://localhost:3001
                -e GOOGLE_CLIENT_ID=smoke-test
                -e GOOGLE_CLIENT_SECRET=smoke-test
                -e GOOGLE_CALLBACK_URL=http://localhost:3002/v1/auth/google/callback
              )
              ;;
          esac
          docker run "${ARGS[@]}" "ikaro-${{ matrix.service }}:scan"
          sleep 5
          docker logs "smoke-${{ matrix.service }}"
          STATUS=$(docker inspect "smoke-${{ matrix.service }}" --format='{{.State.Status}}')
          docker rm -f "smoke-${{ matrix.service }}"
          if [ "$STATUS" != "running" ]; then
            echo "❌ Container exited instead of staying up — see logs above"
            exit 1
          fi
          echo "✅ Container booted and is still running"

  checkov:
    name: Checkov IaC Scan
    needs: [test-suite-passed]
    # Same transitive-skip fix as gitleaks above — see its comment.
    # CRITICAL for this job specifically: without this, Checkov never
    # actually scans Terraform on an infra-only PR at all — its own
    # internal steps.filter.outputs.terraform check (below) never got a
    # chance to run, because the whole job was silently skipped first.
    # Confirmed live on PR #192 (infra/terraform-only, no app changes):
    # this job showed 0s/no steps executed, despite touching
    # infra/terraform/** and test-suite-passed having genuinely succeeded.
    if: always() && needs.test-suite-passed.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect Terraform changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            terraform:
              - 'infra/terraform/**'

      - name: Checkov — Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: infra/terraform
          external_checks_dirs: infra/terraform/.checkov/custom_checks
          # Test fixtures (infra/terraform/modules/*/tests/*.tftest.hcl)
          # necessarily use realistic secret-catalog names (db-password,
          # jwt-secret, ...) as map keys with fake placeholder values,
          # which Checkov's secrets scanner (CKV_SECRET_6, a different
          # engine from the terraform IaC checks above) flags as
          # high-entropy candidates every time — discovery finding,
          # M17-S17, 2026-07-18. Excluding just this path keeps the
          # secrets scanner active for real .tf/.tfvars files (defense in
          # depth alongside the separate, repo-wide Gitleaks job) without
          # false positives on known-fake test data, and without needing
          # a #checkov:skip on every fixture line in every future module's
          # tests.
          skip_path: modules/.*/tests/.*
          soft_fail: false
          quiet: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: steps.filter.outputs.terraform == 'true' && always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: checkov-results.sarif

  # ---------------------------------------------------------------------
  # Single consolidating gate (2026-07-23) replacing 9 individually-listed
  # branch-protection required checks (Backend/Backend Integration Unit
  # Tests, Gitleaks, Snyk SCA, Trivy x3, Checkov, SonarCloud) — all nine
  # were independently skippable (correctly, by design) on a PR that
  # doesn't touch app code, and GitHub's branch protection does not treat
  # a required check reporting "skipped" as satisfying the requirement,
  # permanently blocking every infra-only PR from merging (confirmed live
  # on PR #192 and, earlier, TD27's PR #185). test-suite-passed already
  # solved this for the 6 functional test jobs; this job extends the same
  # allow-list pattern to the 5 security/quality scan jobs, none of which
  # had a gate at all. Depends on each SCAN job directly (not
  # test-suite-passed a second time) so a matrix job like trivy-scan rolls
  # up correctly via needs.trivy-scan.result regardless of what name any
  # individual matrix leg gets reported under — this doesn't care whether
  # Trivy's own matrix-collapse-prone naming is exercised correctly, only
  # whether the job's overall result was success-or-skipped.
  all-checks-passed:
    name: All Checks Passed
    needs: [test-suite-passed, gitleaks, snyk-sca, trivy-scan, checkov, sonar]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        env:
          TEST_SUITE_RESULT: ${{ needs.test-suite-passed.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          SNYK_SCA_RESULT: ${{ needs.snyk-sca.result }}
          TRIVY_SCAN_RESULT: ${{ needs.trivy-scan.result }}
          CHECKOV_RESULT: ${{ needs.checkov.result }}
          SONAR_RESULT: ${{ needs.sonar.result }}
        run: |
          failed=false
          for result in "$TEST_SUITE_RESULT" "$GITLEAKS_RESULT" "$SNYK_SCA_RESULT" \
                        "$TRIVY_SCAN_RESULT" "$CHECKOV_RESULT" "$SONAR_RESULT"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Found a non-passing result: $result"
              failed=true
            fi
          done
          if [ "$failed" = "true" ]; then
            echo "One or more required checks did not pass."
            exit 1
          fi
          echo "All required checks passed (or were correctly skipped for a non-app change)."
