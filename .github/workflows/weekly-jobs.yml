name: Weekly — Security And Quality Baseline

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-unfixed:
    name: Trivy Unfixed CVE Scan (${{ matrix.service }})
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: apps/backend/Dockerfile
          - service: bff
            dockerfile: apps/bff/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Required for `docker buildx build`'s type=gha cache backend when
      # invoked directly in a run: step (not via docker/build-push-action):
      # ACTIONS_RUNTIME_TOKEN/cache endpoint vars exist on the runner but
      # are not exposed to plain run: steps by default — without this,
      # --cache-from type=gha fails silently and this always does a full
      # rebuild regardless of pr-tests.yml having already populated the
      # same trivy-${{ matrix.service }} scope (review finding, 2026-07-22,
      # M17-S25 — same gap already fixed in pr-tests.yml and
      # deploy-staging.yml).
      - name: Expose GitHub Actions runtime for GHA cache backend
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Set up Docker Buildx
        run: docker buildx create --use --driver docker-container

      - name: Build ${{ matrix.service }} image
        run: |
          docker buildx build \
            --cache-from type=gha,scope=trivy-${{ matrix.service }} \
            --load \
            -f ${{ matrix.dockerfile }} \
            -t ikaro-${{ matrix.service }}:weekly-scan \
            .

      - name: Trivy scan — all CVEs including unfixed
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ikaro-${{ matrix.service }}:weekly-scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '0'

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-unfixed-${{ matrix.service }}

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate coverage reports
        run: |
          pnpm --filter @ikaro/backend test:cov
          pnpm --filter @ikaro/bff test:cov
          pnpm --filter @ikaro/web test:cov
          pnpm --filter @ikaro/observability test:cov
          pnpm --filter @ikaro/env-validation test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snyk-sca:
    name: Snyk SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Snyk SCA — all workspaces
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          args: --severity-threshold=high --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
