name: Foundation — Terraform Bootstrap Pipeline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Bootstrap the foundation identities from main using the existing protected deployer path.'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Terraform validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        environment: [staging, prod]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform validate — ${{ matrix.environment }}
        working-directory: infra/terraform/foundation/envs/${{ matrix.environment }}
        run: |
          terraform init -backend=false -input=false -lockfile=readonly
          terraform validate

  test:
    name: Terraform test (foundation control plane)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform init — foundation control plane
        working-directory: infra/terraform/foundation/modules/control-plane
        run: terraform init -input=false -lockfile=readonly

      - name: terraform test — foundation control plane
        working-directory: infra/terraform/foundation/modules/control-plane
        run: terraform test

  bootstrap_plan_staging:
    name: Terraform plan — foundation bootstrap (staging)
    needs: [validate, test]
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as existing bootstrap deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_STAGING }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform plan — foundation bootstrap staging
        working-directory: infra/terraform/foundation/envs/staging
        run: |
          terraform init -input=false -lockfile=readonly
          terraform plan -input=false -no-color -lock-timeout=60s -out=tfplan >/dev/null
          terraform show -json tfplan | jq -r '.resource_changes[] | "\(.address): \(.change.actions | join(","))"' > plan-summary.txt
          {
            echo "### Foundation bootstrap plan — staging"
            echo '```'
            cat plan-summary.txt
            echo '```'
            echo "Resource addresses and actions only; no attribute values or plan artifact are retained."
          } >> "$GITHUB_STEP_SUMMARY"
          rm -f tfplan plan-summary.txt

  bootstrap_staging:
    name: Bootstrap foundation (staging)
    needs: bootstrap_plan_staging
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging-foundation
    concurrency:
      # Share the normal infrastructure mutation lock during the one-time
      # bootstrap. The foundation state is separate, but this job temporarily
      # uses the normal deployer and must not overlap any of its applies.
      group: staging-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as existing bootstrap deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_STAGING }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform apply — foundation bootstrap staging
        working-directory: infra/terraform/foundation/envs/staging
        run: |
          terraform init -input=false -lockfile=readonly
          terraform apply -input=false -lock-timeout=60s -auto-approve

  bootstrap_plan_prod:
    name: Terraform plan — foundation bootstrap (prod)
    needs: [validate, test, bootstrap_staging, verify_staging_foundation_wif]
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-infrastructure
    concurrency:
      # See bootstrap_staging: serialize the temporary bootstrap identity with
      # all normal production mutations; never cancel an in-flight apply.
      group: production-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as existing bootstrap deployer (prod)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_PROD }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform plan — foundation bootstrap prod
        working-directory: infra/terraform/foundation/envs/prod
        run: |
          terraform init -input=false -lockfile=readonly
          terraform plan -input=false -no-color -lock-timeout=60s -out=tfplan >/dev/null
          terraform show -json tfplan | jq -r '.resource_changes[] | "\(.address): \(.change.actions | join(","))"' > plan-summary.txt
          {
            echo "### Foundation bootstrap plan — production"
            echo '```'
            cat plan-summary.txt
            echo '```'
            echo "Resource addresses and actions only; no attribute values or plan artifact are retained."
          } >> "$GITHUB_STEP_SUMMARY"
          rm -f tfplan plan-summary.txt

  bootstrap_prod:
    name: Bootstrap foundation (prod)
    needs: bootstrap_plan_prod
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-infrastructure
    concurrency:
      # See bootstrap_staging: serialize the temporary bootstrap identity with
      # all normal production mutations; never cancel an in-flight apply.
      group: production-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as existing bootstrap deployer (prod)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_PROD }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform apply — foundation bootstrap prod
        working-directory: infra/terraform/foundation/envs/prod
        run: |
          terraform init -input=false -lockfile=readonly
          terraform apply -input=false -lock-timeout=60s -auto-approve

  verify_staging_foundation_wif:
    name: Verify foundation WIF (staging)
    needs: bootstrap_staging
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging-foundation
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate as foundation deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_FOUNDATION_SA_STAGING }}

      - name: Verify active foundation identity
        run: |
          active_account=$(gcloud auth list --filter=status:ACTIVE --format='value(account)')
          test "$active_account" = "$TF_FOUNDATION_SA"
        env:
          TF_FOUNDATION_SA: ${{ secrets.TF_FOUNDATION_SA_STAGING }}

  verify_prod_foundation_wif:
    name: Verify foundation WIF (prod)
    needs: bootstrap_prod
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production-foundation
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate as foundation deployer (prod)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_FOUNDATION_SA_PROD }}

      - name: Verify active foundation identity
        run: |
          active_account=$(gcloud auth list --filter=status:ACTIVE --format='value(account)')
          test "$active_account" = "$TF_FOUNDATION_SA"
        env:
          TF_FOUNDATION_SA: ${{ secrets.TF_FOUNDATION_SA_PROD }}
