name: Foundation — Terraform Bootstrap Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/foundation/**'
      - '.github/workflows/foundation-deploy.yml'
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Bootstrap the foundation identities from main using the existing protected deployer path.'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Terraform validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        environment: [staging, prod]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform validate — ${{ matrix.environment }}
        working-directory: infra/terraform/foundation/envs/${{ matrix.environment }}
        run: |
          terraform init -backend=false -input=false -lockfile=readonly
          terraform validate

  test:
    name: Terraform test (foundation control plane)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform init — foundation control plane
        working-directory: infra/terraform/foundation/modules/control-plane
        run: terraform init -input=false -lockfile=readonly

      - name: terraform test — foundation control plane
        working-directory: infra/terraform/foundation/modules/control-plane
        run: terraform test

  bootstrap_staging:
    name: Bootstrap foundation (staging)
    needs: [validate, test]
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging-infrastructure
    concurrency:
      # Share the normal infrastructure mutation lock during the one-time
      # bootstrap. The foundation state is separate, but this job temporarily
      # uses the normal deployer and must not overlap any of its applies.
      group: staging-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as existing bootstrap deployer (staging)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_STAGING }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform apply — foundation bootstrap staging
        working-directory: infra/terraform/foundation/envs/staging
        run: |
          terraform init -input=false -lockfile=readonly
          terraform apply -input=false -lock-timeout=60s -auto-approve

  bootstrap_prod:
    name: Bootstrap foundation (prod)
    needs: [validate, test, bootstrap_staging]
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-infrastructure
    concurrency:
      # See bootstrap_staging: serialize the temporary bootstrap identity with
      # all normal production mutations; never cancel an in-flight apply.
      group: production-mutations
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Authenticate as existing bootstrap deployer (prod)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_PROD }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false

      - name: terraform apply — foundation bootstrap prod
        working-directory: infra/terraform/foundation/envs/prod
        run: |
          terraform init -input=false -lockfile=readonly
          terraform apply -input=false -lock-timeout=60s -auto-approve
