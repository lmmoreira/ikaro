name: Verify Environments + Variables (throwaway - M17-S23)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  staging:
    name: 'staging: app-deployer WIF + vars/secrets resolve (expect no wait)'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Print resolved repository variables
        run: |
          echo "GCP_PROJECT_STAGING=${{ vars.GCP_PROJECT_STAGING }}"
          echo "GCP_PROJECT_PROD=${{ vars.GCP_PROJECT_PROD }}"
          echo "GCP_REGION=${{ vars.GCP_REGION }}"
          echo "GAR_HOST=${{ vars.GAR_HOST }}"
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.APP_DEPLOYER_SA_STAGING }}
      - run: 'gcloud auth print-access-token > /dev/null && echo "RESULT: staging app-deployer WIF SUCCEEDED"'

  staging-infrastructure:
    name: 'staging-infrastructure: tf-deployer WIF resolves (expect no wait)'
    runs-on: ubuntu-latest
    environment: staging-infrastructure
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_STAGING }}
      - run: 'gcloud auth print-access-token > /dev/null && echo "RESULT: staging-infrastructure tf-deployer WIF SUCCEEDED"'

  production:
    name: 'production: app-deployer WIF + secrets resolve (expect WAIT for approval)'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify CLOUDFLARE_API_TOKEN resolves (non-empty, never printed)
        run: |
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" && echo "RESULT: CLOUDFLARE_API_TOKEN resolved OK"
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.APP_DEPLOYER_SA_PROD }}
      - run: 'gcloud auth print-access-token > /dev/null && echo "RESULT: production app-deployer WIF SUCCEEDED (post-approval)"'

  production-infrastructure:
    name: 'production-infrastructure: tf-deployer WIF resolves (expect WAIT for approval)'
    runs-on: ubuntu-latest
    environment: production-infrastructure
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.TF_DEPLOYER_SA_PROD }}
      - run: 'gcloud auth print-access-token > /dev/null && echo "RESULT: production-infrastructure tf-deployer WIF SUCCEEDED (post-approval)"'
