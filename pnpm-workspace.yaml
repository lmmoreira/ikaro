packages:
  - 'apps/*'
  - 'packages/*'
overrides:
  '@grpc/grpc-js': '1.14.4'
  'form-data': '4.0.6'
  'multer': '2.2.0'
  '@nestjs/platform-express>multer': '2.2.0'
  '@opentelemetry/core': '2.8.0'
  # gcp-metadata@8.1.3 pins gaxios@7.1.3 exactly; 7.1.5 drops the rimraf dep
  # that carries the SNYK-JS-BRACEEXPANSION-17706650 chain. No upstream release
  # fixes this yet — override until google-cloud libraries loosen their pin.
  'gaxios': '7.1.5'
  # google-gax@5.0.7 directly depends on rimraf@^5 which chains to brace-expansion@2.x
  # (SNYK-JS-BRACEEXPANSION-17706650). Snyk claims fixed in google-gax@5.0.7 but
  # 5.0.7 still carries the dep. No newer google-gax exists. rimraf@6 uses glob@11
  # (brace-expansion@5, not vulnerable) and is API-compatible with v5.
  'google-gax>rimraf': '6.1.3'
  # rimraf@6 chains to brace-expansion@5.0.6 via glob@13>minimatch@10; Snyk marks
  # brace-expansion@5.0.7 as the patched release for SNYK-JS-BRACEEXPANSION-17706650.
  'brace-expansion': '5.0.7'
  # Next 16.2.10 still resolves postcss@8.4.31, which is below the patched line.
  # Remove once Next ships a release that pulls postcss>=8.5.10 on its own.
  'next>postcss': '8.5.16'
  # @google-cloud/storage 7.21.0 still resolves teeny-request/retry-request with
  # uuid<11.1.1. Keep these overrides until the storage package family updates.
  '@google-cloud/storage>teeny-request': '10.1.3'
  '@google-cloud/storage>retry-request': '8.0.3'
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@swc/core': true
  cpu-features: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
