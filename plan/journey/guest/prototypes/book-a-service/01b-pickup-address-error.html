<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 1 — Erro: endereço de coleta</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    VARIANT OF: 01-service-selection.html
    SCENARIO:   "Lavagem com Coleta" selected (requiresPickupAddress: true), pickup address
                fields rendered, guest clicked "Próximo" with the fields empty.
    COMPONENT:  ServiceSelectionStep + AddressFields  (apps/web/components/booking/)
    ERROR:      "Informe o endereço de coleta para continuar."  (data-testid="step1-error")
  -->
  <!-- GUEST LOGIN BAR -->
  <div style="
    background: var(--ba-secondary); padding: 0.5rem 1.5rem;
    display: flex; align-items: center; justify-content: flex-end;
  ">
    <a href="../../../shared/login.html" style="
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ba-primary); text-decoration: none;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 1 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha os serviços</h2>

    <ul style="display: flex; flex-direction: column; gap: 0.75rem; list-style: none; padding: 0;">
      <li>
        <label class="card" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox">
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Lavagem Simples</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Limpeza externa completa com secagem</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 60,00</p>
            <p style="opacity: 0.75;">30 min</p>
          </div>
        </label>
      </li>

      <li>
        <label class="card" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox">
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Polimento Completo</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Polimento e cristalização da pintura</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 250,00</p>
            <p style="opacity: 0.75;">2 h</p>
          </div>
        </label>
      </li>

      <!-- Card 3 — selected: requiresPickupAddress: true -->
      <li>
        <label class="card selected" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
          <input type="checkbox" checked>
          <div style="flex: 1;">
            <p style="font-weight: 600; color: var(--ba-text)">Lavagem com Coleta</p>
            <p style="font-size: 0.875rem; opacity: 0.75;">Buscamos e entregamos seu veículo</p>
          </div>
          <div style="text-align: right; font-size: 0.875rem;">
            <p style="font-weight: 600; color: var(--ba-primary)">R$ 90,00</p>
            <p style="opacity: 0.75;">45 min</p>
          </div>
        </label>
      </li>
    </ul>

    <p style="margin-top: 1rem; font-weight: 600; color: var(--ba-text)" data-testid="selection-total">
      1 serviço — R$ 90,00 — 45 min
    </p>

    <!--
      PICKUP ADDRESS FIELDS — rendered because requiresPickupAddress = true.
      Fields left empty to demonstrate the validation error after "Próximo".
      COMPONENT: AddressFields  (apps/web/components/booking/AddressFields.tsx)
      ZIP autocomplete: lib/address/viacep-address-lookup.adapter.ts — no documented
      fallback if ViaCEP itself is unreachable (CEP just stays unresolved).
    -->
    <div style="margin-top: 1.5rem;">
      <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--ba-text)">Endereço de coleta</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div style="grid-column: span 2;">
          <label class="form-label" for="zip">CEP</label>
          <input id="zip" class="form-input" type="text" placeholder="00000-000" maxlength="9" style="border-color: #dc2626;">
        </div>
        <div style="grid-column: span 2;">
          <label class="form-label" for="street">Rua</label>
          <input id="street" class="form-input" type="text" style="border-color: #dc2626;">
        </div>
        <div>
          <label class="form-label" for="number">Número</label>
          <input id="number" class="form-input" type="text" style="border-color: #dc2626;">
        </div>
        <div>
          <label class="form-label" for="complement">Complemento</label>
          <input id="complement" class="form-input" type="text" placeholder="Opcional">
        </div>
        <div>
          <label class="form-label" for="neighborhood">Bairro</label>
          <input id="neighborhood" class="form-input" type="text" style="border-color: #dc2626;">
        </div>
        <div>
          <label class="form-label" for="city">Cidade</label>
          <input id="city" class="form-input" type="text" style="border-color: #dc2626;">
        </div>
        <div>
          <label class="form-label" for="state">Estado (UF)</label>
          <input id="state" class="form-input" type="text" maxlength="2" placeholder="SP" style="border-color: #dc2626;">
        </div>
      </div>
      <div role="alert" style="
        display: flex; align-items: flex-start; gap: 0.625rem;
        background: #fef2f2; border: 1.5px solid #fca5a5;
        border-radius: var(--ba-radius); padding: 0.75rem 1rem;
        margin-top: 0.75rem;
      " data-testid="step1-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 1px;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span style="font-size: 0.875rem; color: #dc2626; font-weight: 500;">Informe o endereço de coleta para continuar.</span>
      </div>
    </div>

    <div class="nav-buttons">
      <button class="btn-secondary" onclick="window.history.back()">Voltar</button>
      <a class="btn-primary" href="02-calendar-slot.html">Próximo</a>
    </div>
  </div>
</body>
</html>
