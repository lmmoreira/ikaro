<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 2 — Erro ao carregar disponibilidade</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    VARIANT OF: 02-calendar-slot.html
    SCENARIO:   fetchAvailabilitySummary() rejected (error === true in component state) —
                e.g. BFF unreachable or 5xx from GET /schedule/availability/summary.
    COMPONENT:  AvailabilityCarousel  apps/web/components/booking/AvailabilityCarousel.tsx  (EXISTS)

    KNOWN LIMITATION (see dev-notes.md "Known limitations"): the message says
    "Tente novamente" but there is no retry button. The fetch only runs once, in a
    useEffect with deps [slug, serviceIds] — only a full page reload re-triggers it.
  -->
  <!-- GUEST LOGIN BAR -->
  <div style="
    background: var(--ba-secondary); padding: 0.5rem 1.5rem;
    display: flex; align-items: center; justify-content: flex-end;
  ">
    <a href="../../../shared/login.html" style="
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ba-primary); text-decoration: none;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 2 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha data e horário</h2>

    <!--
      RETRY PATTERN: clicking "Tentar novamente" resets error=false and increments retryCount
      in AvailabilityCarousel state, which re-triggers the useEffect fetch.
      In this static prototype, onclick reloads the page to simulate the retry.
    -->
    <div role="alert" style="
      background: #fef2f2; border: 1.5px solid #fca5a5;
      border-radius: var(--ba-radius); padding: 0.75rem 1rem;
      margin-top: 0.5rem;
    ">
      <div style="display: flex; align-items: flex-start; gap: 0.625rem;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 1px;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span style="font-size: 0.875rem; color: #dc2626; font-weight: 500;">Não foi possível carregar a disponibilidade.</span>
      </div>
      <button
        onclick="location.reload()"
        style="
          margin-top: 0.625rem; margin-left: 1.625rem;
          font-size: 0.875rem; font-weight: 600; color: #dc2626;
          background: none; border: 1.5px solid #fca5a5;
          border-radius: var(--ba-radius); padding: 0.375rem 0.875rem;
          cursor: pointer;
        "
      >
        Tentar novamente
      </button>
    </div>

    <div class="nav-buttons">
      <a class="btn-secondary" href="01-service-selection.html">Voltar</a>
      <button class="btn-primary" disabled style="opacity: 0.6; cursor: not-allowed;">Próximo</button>
    </div>
  </div>
</body>
</html>
