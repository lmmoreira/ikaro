<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 2 — Erro ao carregar horários (SlotPicker)</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    VARIANT OF: 02-calendar-slot.html
    SCENARIO:   AvailabilityCarousel loaded successfully, guest selected Qua 18.
                SlotPicker then called fetchAvailability() for that date and it rejected
                (e.g. BFF 5xx or network error).
    COMPONENT:  SlotPicker  apps/web/components/booking/SlotPicker.tsx  (EXISTS)
    STATE:      errorDate === date  →  shows error block instead of the slot grid.

    RETRY PATTERN: clicking "Tentar novamente" resets errorDate=null and increments
    retryCount in SlotPicker state, which re-triggers the useEffect fetch.
    In this static prototype, onclick reloads the page to simulate the retry.

    NOTE: the carousel remains visible and interactive above — the guest can also
    pick a different day to implicitly retry with another date.
  -->
  <!-- GUEST LOGIN BAR -->
  <div style="
    background: var(--ba-secondary); padding: 0.5rem 1.5rem;
    display: flex; align-items: center; justify-content: flex-end;
  ">
    <a href="../../../shared/login.html" style="
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ba-primary); text-decoration: none;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 2 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha data e horário</h2>

    <!-- AVAILABILITY CAROUSEL — loaded normally; Qua 18 selected -->
    <div style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEG</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">16</p>
      </div>
      <div class="day-pill available">
        <p style="font-size: 0.7rem; font-weight: 600;">TER</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">17</p>
      </div>
      <div class="day-pill selected">
        <p style="font-size: 0.7rem; font-weight: 600;">QUA</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">18</p>
      </div>
      <div class="day-pill available">
        <p style="font-size: 0.7rem; font-weight: 600;">QUI</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">19</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEX</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">20</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SÁB</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">21</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">DOM</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">22</p>
      </div>
    </div>

    <!--
      SLOT PICKER — error state (errorDate === date).
      Replaces the slot grid entirely.
    -->
    <div style="margin-top: 1.5rem;">
      <p style="font-size: 0.875rem; opacity: 0.75; margin-bottom: 0.75rem;">
        Horários disponíveis — Qua, 18 de junho
      </p>

      <div role="alert" style="
        background: #fef2f2; border: 1.5px solid #fca5a5;
        border-radius: var(--ba-radius); padding: 0.75rem 1rem;
      ">
        <div style="display: flex; align-items: flex-start; gap: 0.625rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 1px;">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span style="font-size: 0.875rem; color: #dc2626; font-weight: 500;">Não foi possível carregar os horários para este dia.</span>
        </div>
        <button
          onclick="location.reload()"
          style="
            margin-top: 0.625rem; margin-left: 1.625rem;
            font-size: 0.875rem; font-weight: 600; color: #dc2626;
            background: none; border: 1.5px solid #fca5a5;
            border-radius: var(--ba-radius); padding: 0.375rem 0.875rem;
            cursor: pointer;
          "
        >
          Tentar novamente
        </button>
      </div>
    </div>

    <div class="nav-buttons">
      <a class="btn-secondary" href="01-service-selection.html">Voltar</a>
      <!-- Disabled: no slot selected because SlotPicker errored -->
      <button class="btn-primary" disabled style="opacity: 0.6; cursor: not-allowed;">Próximo</button>
    </div>
  </div>
</body>
</html>
