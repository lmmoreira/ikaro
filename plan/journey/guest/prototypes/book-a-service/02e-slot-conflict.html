<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passo 2 — Horário indisponível (409)</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>
  <!--
    VARIANT OF: 02-calendar-slot.html
    SCENARIO:   Guest picked Qua 18 / 10:00, advanced to step 4, clicked "Confirmar
                agendamento". POST /bookings returned 409 Conflict (slot taken between
                selection and submit). BookingForm calls setStep(2) + setStep2Error(...).
    COMPONENT:  AvailabilityCarousel + SlotPicker  (EXISTS)
    ERROR:      "Horário indisponível, escolha outro"  (data-testid="step2-error")

    NOTE: the previously selected slot (10:00) remains visually selected — the guest
    must actively pick a different slot before "Próximo" makes sense again.
  -->
  <!-- GUEST LOGIN BAR -->
  <div style="
    background: var(--ba-secondary); padding: 0.5rem 1.5rem;
    display: flex; align-items: center; justify-content: flex-end;
  ">
    <a href="../../../shared/login.html" style="
      display: flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 500;
      color: var(--ba-primary); text-decoration: none;
    ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Entrar
    </a>
  </div>

  <div class="step-container">
    <p class="step-indicator">Passo 2 de 4</p>
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--ba-text)">Escolha data e horário</h2>

    <div style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEG</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">16</p>
      </div>
      <div class="day-pill available">
        <p style="font-size: 0.7rem; font-weight: 600;">TER</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">17</p>
      </div>
      <div class="day-pill selected">
        <p style="font-size: 0.7rem; font-weight: 600;">QUA</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">18</p>
      </div>
      <div class="day-pill available">
        <p style="font-size: 0.7rem; font-weight: 600;">QUI</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">19</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SEX</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">20</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">SÁB</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">21</p>
      </div>
      <div class="day-pill unavailable">
        <p style="font-size: 0.7rem; font-weight: 600;">DOM</p>
        <p style="font-weight: 700; font-size: 0.9375rem;">22</p>
      </div>
    </div>

    <div style="margin-top: 1.5rem;">
      <p style="font-size: 0.875rem; opacity: 0.75; margin-bottom: 0.75rem;">
        Horários disponíveis — Qua, 18 de junho
      </p>
      <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
        <button class="slot-btn">08:00</button>
        <button class="slot-btn">09:00</button>
        <button class="slot-btn selected">10:00</button>
        <button class="slot-btn">11:00</button>
        <button class="slot-btn">14:00</button>
        <button class="slot-btn">15:00</button>
        <button class="slot-btn">16:00</button>
      </div>
    </div>

    <div role="alert" style="
      display: flex; align-items: flex-start; gap: 0.625rem;
      background: #fef2f2; border: 1.5px solid #fca5a5;
      border-radius: var(--ba-radius); padding: 0.75rem 1rem;
      margin-top: 1rem;
    " data-testid="step2-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 1px;">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span style="font-size: 0.875rem; color: #dc2626; font-weight: 500;">Este horário não está mais disponível. Por favor, escolha outro.</span>
    </div>

    <div class="nav-buttons">
      <a class="btn-secondary" href="01-service-selection.html">Voltar</a>
      <a class="btn-primary" href="03-personal-info.html">Próximo</a>
    </div>
  </div>
</body>
</html>
