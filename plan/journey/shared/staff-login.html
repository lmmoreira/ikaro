<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Área da Equipe Ikaro</title>
  <link rel="stylesheet" href="./tokens.css">
</head>
<body>

  <!--
    SHARED FILE — plan/journey/shared/staff-login.html
    Used by: all staff / manager journey prototypes that start from login
    Do not duplicate per actor — link here via ../../../shared/staff-login.html

    PAGE (GAP): apps/web/app/dashboard/login/page.tsx
    ROUTE:      /dashboard/login
    Auth guard: none (public) — redirects to /dashboard after JWT is set

    ── UC-022 Regular Login ──────────────────────────────────────────────────
    1. Staff visits /dashboard/login
    2. Clicks "Entrar com Google"
    3. GET /api/auth/google?state=__staff__   (encodeOAuthState('staff'))
    4. Google OAuth consent
    5. Callback → BFF resolves staff by googleOAuthId
    6a. Active   → JWT cookie → redirect /dashboard
    6b. Inactive → redirect /auth/first-login?staffId=...  (invite not yet accepted)
    6c. Not found → redirect /auth/error?reason=not-a-staff-member

    ── UC-025 First Login / Accept Invite ───────────────────────────────────
    Staff receives invite email with a link that encodes tenantSlug in state:
      GET /api/auth/google?state=__staff__:{tenantSlug}
    Callback → BFF calls POST /internal/staff/{id}/activate → issues JWT → /dashboard
    In prototype: the "Primeiro acesso?" link is informational only.
  -->

  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f9fafb;">
    <div class="card" style="width: 100%; max-width: 24rem; padding: 2.25rem; text-align: center;">

      <!-- Ikaro logo mark -->
      <div style="
        width: 3rem; height: 3rem;
        background: var(--ba-primary); border-radius: var(--ba-radius);
        margin: 0 auto 1.25rem;
        display: flex; align-items: center; justify-content: center;
      ">
        <span style="color: white; font-weight: 700; font-size: 1.25rem;">B</span>
      </div>

      <h1 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.375rem; color: var(--ba-text)">
        Área da Equipe
      </h1>
      <p style="font-size: 0.875rem; opacity: 0.6; margin-bottom: 1.75rem; color: var(--ba-text)">
        Acesso exclusivo para funcionários e gerentes
      </p>

      <!--
        GOOGLE SIGN-IN BUTTON
        Real action: GET /api/auth/google?state=__staff__
        In prototype: simulates successful login → goes to the real Agenda page
        (dashboard-shell.html is a generic master template for building new staff
        pages, not a finished page itself — see its own header comment).
      -->
      <a
        href="../staff/prototypes/agenda/00-agenda.html"
        style="
          display: flex; align-items: center; justify-content: center; gap: 0.75rem;
          border: 1px solid var(--ba-secondary); border-radius: var(--ba-radius);
          padding: 0.75rem 1.5rem; width: 100%;
          text-decoration: none; color: var(--ba-text);
          font-weight: 500; font-size: 0.9375rem;
          box-shadow: var(--ba-shadow);
          transition: box-shadow 0.15s;
        "
      >
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z" fill="#FFC107"/>
          <path d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" fill="#FF3D00"/>
          <path d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2A12 12 0 0 1 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z" fill="#4CAF50"/>
          <path d="M43.6 20.1H42V20H24v8h11.3a12 12 0 0 1-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.7-.4-3.9z" fill="#1976D2"/>
        </svg>
        Entrar com Google
      </a>

      <!--
        ERROR STATES — canonical error copy lives in ONE place:
        staff/prototypes/login/01b-error.html (not-a-staff-member) plus its
        01c/01d siblings (email-mismatch, tenant-deactivated). Do not duplicate
        the error copy here — link to the real variant screens instead so a
        reviewer can see them without reading source.
      -->
      <p style="margin-top: 1rem; font-size: 0.8125rem; text-align: center;">
        <a href="../staff/prototypes/login/01b-error.html" style="color: #dc2626;">
          Ver estado de erro (não cadastrado como funcionário) →
        </a>
      </p>

      <div style="margin-top: 1.75rem; border-top: 1px solid var(--ba-secondary); padding-top: 1.25rem;">
        <p style="font-size: 0.8125rem; color: var(--ba-text); opacity: 0.55; margin-bottom: 0.375rem;">
          Primeiro acesso?
        </p>
        <p style="font-size: 0.8125rem; color: var(--ba-text); opacity: 0.55;">
          Use o link enviado no e-mail de convite.
          Ele redirecionará para o Google automaticamente.
        </p>
      </div>

      <p style="margin-top: 1.5rem; font-size: 0.75rem; opacity: 0.4; color: var(--ba-text);">
        <a href="./hotsite.html" style="color: var(--ba-primary);">← Voltar ao site público</a>
      </p>

    </div>
  </div>

</body>
</html>
