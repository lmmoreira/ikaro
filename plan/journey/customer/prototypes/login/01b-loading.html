<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selecionar Estabelecimento — Carregando — Ikaro</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
  <style>
    @keyframes ba-skeleton-pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    .skeleton { background: var(--ba-secondary); border-radius: var(--ba-radius); animation: ba-skeleton-pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>

  <!--
    VARIANT OF: 01-select-tenant.html
    SCENARIO:   SelectTenantPage just mounted; the ?token= param is being decoded
                (or GET /v1/auth/tenants?token=... is in flight). Per dev-notes.md
                "Loading state: skeleton cards while token is decoded."
    COMPONENT (GAP): SelectTenantPage  apps/web/app/select-tenant/page.tsx
  -->

  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center;
              background: var(--ba-background); padding: 1.5rem;">
    <div style="width: 100%; max-width: 28rem;">

      <!-- Header -->
      <div style="text-align: center; margin-bottom: 2rem;">
        <div style="
          width: 3rem; height: 3rem;
          background: var(--ba-primary); border-radius: var(--ba-radius);
          margin: 0 auto 0.75rem;
          display: flex; align-items: center; justify-content: center;
        ">
          <span style="color: white; font-weight: 700; font-size: 1.25rem;">B</span>
        </div>
        <p style="font-weight: 700; font-size: 0.9375rem; color: var(--ba-text); margin-bottom: 0.75rem;">
          BeloAuto
        </p>
        <h1 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.375rem; color: var(--ba-text)">
          Qual lava-car deseja acessar?
        </h1>
        <p style="font-size: 0.875rem; opacity: 0.6; color: var(--ba-text)">
          Sua conta está vinculada a mais de um estabelecimento.
        </p>
      </div>

      <!-- Skeleton cards — same layout as the real tenant cards, content not yet known -->
      <div style="display: flex; flex-direction: column; gap: 0.75rem;">

        <div style="
          display: flex; align-items: center; gap: 1rem;
          padding: 1rem 1.25rem;
          border: 2px solid var(--ba-secondary);
          border-radius: var(--ba-radius);
          background: white;
          box-shadow: var(--ba-shadow);
        ">
          <div class="skeleton" style="width: 2.5rem; height: 2.5rem; flex-shrink: 0;"></div>
          <div style="flex: 1; min-width: 0;">
            <div class="skeleton" style="height: 0.9375rem; width: 60%; margin-bottom: 0.5rem;"></div>
            <div class="skeleton" style="height: 0.8125rem; width: 40%;"></div>
          </div>
        </div>

        <div style="
          display: flex; align-items: center; gap: 1rem;
          padding: 1rem 1.25rem;
          border: 2px solid var(--ba-secondary);
          border-radius: var(--ba-radius);
          background: white;
          box-shadow: var(--ba-shadow);
        ">
          <div class="skeleton" style="width: 2.5rem; height: 2.5rem; flex-shrink: 0;"></div>
          <div style="flex: 1; min-width: 0;">
            <div class="skeleton" style="height: 0.9375rem; width: 50%; margin-bottom: 0.5rem;"></div>
            <div class="skeleton" style="height: 0.8125rem; width: 35%;"></div>
          </div>
        </div>

      </div>

      <p style="margin-top: 1.75rem; text-align: center; font-size: 0.75rem; opacity: 0.4; color: var(--ba-text);">
        Você pode trocar de estabelecimento a qualquer momento após entrar.
      </p>

    </div>
  </div>

</body>
</html>
