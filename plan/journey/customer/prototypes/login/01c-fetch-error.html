<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selecionar Estabelecimento — Erro — Ikaro</title>
  <link rel="stylesheet" href="../../../shared/tokens.css">
</head>
<body>

  <!--
    VARIANT OF: 01-select-tenant.html
    SCENARIO:   GET /v1/auth/tenants?token=... (or token decode) failed — e.g. BFF 5xx
                or network error. Tenant list could not be loaded.
    COMPONENT (GAP): SelectTenantPage  apps/web/app/select-tenant/page.tsx
    RETRY:      onclick reloads the page to simulate the proposed retry (same pattern as
                guest/prototypes/book-a-service/02f-slot-fetch-error.html).
  -->

  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center;
              background: var(--ba-background); padding: 1.5rem;">
    <div style="width: 100%; max-width: 28rem;">

      <!-- Header -->
      <div style="text-align: center; margin-bottom: 2rem;">
        <div style="
          width: 3rem; height: 3rem;
          background: var(--ba-primary); border-radius: var(--ba-radius);
          margin: 0 auto 0.75rem;
          display: flex; align-items: center; justify-content: center;
        ">
          <span style="color: white; font-weight: 700; font-size: 1.25rem;">B</span>
        </div>
        <p style="font-weight: 700; font-size: 0.9375rem; color: var(--ba-text); margin-bottom: 0.75rem;">
          BeloAuto
        </p>
        <h1 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.375rem; color: var(--ba-text)">
          Qual lava-car deseja acessar?
        </h1>
        <p style="font-size: 0.875rem; opacity: 0.6; color: var(--ba-text)">
          Sua conta está vinculada a mais de um estabelecimento.
        </p>
      </div>

      <div role="alert" style="
        background: #fef2f2; border: 1.5px solid #fca5a5;
        border-radius: var(--ba-radius); padding: 0.75rem 1rem;
      ">
        <div style="display: flex; align-items: flex-start; gap: 0.625rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 1px;">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span style="font-size: 0.875rem; color: #dc2626; font-weight: 500;" data-testid="select-tenant-error">
            Não foi possível carregar seus estabelecimentos.
          </span>
        </div>
        <button
          onclick="location.reload()"
          style="
            margin-top: 0.625rem; margin-left: 1.625rem;
            font-size: 0.875rem; font-weight: 600; color: #dc2626;
            background: none; border: 1.5px solid #fca5a5;
            border-radius: var(--ba-radius); padding: 0.375rem 0.875rem;
            cursor: pointer;
          "
        >
          Tentar novamente
        </button>
      </div>

      <p style="margin-top: 1.75rem; text-align: center; font-size: 0.75rem; opacity: 0.4; color: var(--ba-text);">
        Você pode trocar de estabelecimento a qualquer momento após entrar.
      </p>

    </div>
  </div>

</body>
</html>
