sonar.projectKey=lmmoreira_ikaro
sonar.organization=lmmoreira

# Sources
sonar.sources=apps/backend/src,apps/bff/src,apps/web,packages/observability/src,packages/env-validation/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/migrations/**,**/test/**,**/vitest.config.ts,**/vitest.setup.ts,**/axe-helper.ts,**/__mocks__/**,**/eslint.config.js,apps/web/e2e/**

# Test files (reported separately, not as production code)
sonar.tests=apps/backend/src,apps/bff/src,apps/web,packages/observability/src,packages/env-validation/src
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.integration.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=apps/backend/coverage/lcov.info,apps/bff/coverage/lcov.info,apps/web/coverage/lcov.info,packages/observability/coverage/lcov.info,packages/env-validation/coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.spec.tsx,**/*.integration.spec.ts,**/*.e2e.ts,**/migrations/**,**/main.ts,**/seed.ts,**/infrastructure/entities/**,**/*.module.ts,**/test/**,apps/web/app/**/page.tsx,apps/web/app/**/layout.tsx,apps/web/app/not-found.tsx,apps/web/middleware.ts,apps/web/i18n/**,apps/web/next.config.ts

# Differential coverage — ≥80% on new/changed code only
sonar.newCode.referenceBranch=main

# Wait for analysis processing before the action exits (required so the issue-check step runs after results are ready)
sonar.qualitygate.wait=true

# Language
sonar.language=ts
