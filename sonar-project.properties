sonar.projectKey=lmmoreira_beloauto
sonar.organization=lmmoreira

# Sources
sonar.sources=apps/backend/src,apps/bff/src,apps/web
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/migrations/**,**/test/**

# Test files (reported separately, not as production code)
sonar.tests=apps/backend/src,apps/bff/src
sonar.test.inclusions=**/*.spec.ts,**/*.integration.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=apps/backend/coverage/lcov.info,apps/bff/coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.integration.spec.ts,**/*.e2e.ts,**/migrations/**,**/main.ts,**/seed.ts,**/infrastructure/entities/**,**/*.module.ts,**/test/**

# Differential coverage — ≥80% on new/changed code only
sonar.newCode.referenceBranch=main

# Wait for analysis processing before the action exits (required so the issue-check step runs after results are ready)
sonar.qualitygate.wait=true

# Language
sonar.language=ts
